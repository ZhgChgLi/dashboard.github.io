<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f1ebdc">
<link rel="manifest" href="manifest.json">
<title>ZhgChgLi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>

<style>
  :root {
    --bg: #f1ebdc;
    --bg-deep: #e8e0cc;
    --ink: #2a2520;
    --ink-soft: #6b6358;
    --ink-faint: #9a9080;
    --hairline: #cdc3ae;
    --stamp: #a0382e;
    --stamp-deep: #7a2820;
    --up: #2d5a3d;
    --down: #b94a3a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #14110d;
    overflow: hidden;
    font-family: 'Noto Serif TC', 'Source Serif 4', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  #stage {
    width: 736px; height: 414px;
    transform-origin: center center;
    position: relative;
  }

  #device {
    width: 736px; height: 414px;
    background: var(--bg);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.12  0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"),
      radial-gradient(ellipse at 30% 20%, rgba(255,250,235,0.5), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(160,56,46,0.04), transparent 60%);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.5),
      0 8px 24px rgba(0,0,0,0.3),
      inset 0 0 0 1px rgba(0,0,0,0.05);
    color: var(--ink);
  }

  /* deckle edge - subtle paper border imperfection */
  #device::before {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 60px rgba(120, 90, 50, 0.08);
    z-index: 1;
  }

  /* === Header === */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 88px;
    display: flex;
    align-items: stretch;
    padding: 14px 24px 0 28px;
    z-index: 2;
  }

  .date-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .date-line1 {
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-weight: 500;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
  }
  .date-line2 {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-family: 'Noto Serif TC', serif;
  }
  .date-num {
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
    font-feature-settings: 'lnum';
  }
  .date-num .slash {
    color: var(--ink-faint);
    font-weight: 400;
    margin: 0 2px;
  }
  .date-weekday {
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.15em;
    font-weight: 500;
  }
  .date-line3 {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    margin-top: 2px;
  }

  /* === Flip Clock === */
  .clock {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 4px;
  }
  .flip-group {
    display: flex;
    gap: 3px;
  }
  .flip-card {
    position: relative;
    width: 44px;
    height: 60px;
    perspective: 360px;
  }
  .flip-half {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    background: linear-gradient(180deg, #2f2920 0%, #221d18 100%);
    color: #f5efde;
    overflow: hidden;
    font-family: 'Source Serif 4', 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 60px;
    text-align: center;
    font-feature-settings: 'lnum', 'tnum';
  }
  .flip-half.top {
    top: 0;
    border-radius: 4px 4px 0 0;
    box-shadow: inset 0 -1px 0 #000, 0 1px 0 rgba(0,0,0,0.3);
  }
  .flip-half.top > span {
    display: block;
    line-height: 60px;
    transform: translateY(0);
  }
  .flip-half.bottom {
    bottom: 0;
    border-radius: 0 0 4px 4px;
    background: linear-gradient(180deg, #1d1814 0%, #2a2420 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .flip-half.bottom > span {
    display: block;
    line-height: 60px;
    transform: translateY(-30px);
  }
  .flip-flap {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    overflow: hidden;
    backface-visibility: hidden;
    color: #f5efde;
    font-family: 'Source Serif 4', 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 56px;
    text-align: center;
    font-feature-settings: 'lnum', 'tnum';
    z-index: 2;
  }
  .flip-flap.flap-top {
    top: 0;
    background: linear-gradient(180deg, #2f2920 0%, #221d18 100%);
    border-radius: 4px 4px 0 0;
    transform-origin: bottom;
    animation: flap-down 0.32s cubic-bezier(0.4, 0, 0.7, 0.2) forwards;
    box-shadow: inset 0 -1px 0 #000;
  }
  .flip-flap.flap-top > span { display: block; line-height: 60px; }
  .flip-flap.flap-bottom {
    bottom: 0;
    background: linear-gradient(180deg, #1d1814 0%, #2a2420 100%);
    border-radius: 0 0 4px 4px;
    transform-origin: top;
    transform: rotateX(90deg);
    animation: flap-up 0.32s cubic-bezier(0.3, 0.85, 0.6, 1) 0.32s forwards;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .flip-flap.flap-bottom > span { display: block; line-height: 60px; transform: translateY(-30px); }

  @keyframes flap-down {
    0%   { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flap-up {
    0%   { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  .clock-colon {
    color: var(--ink);
    font-family: 'Source Serif 4', serif;
    font-size: 38px;
    font-weight: 600;
    padding: 0 4px;
    line-height: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
  }
  .clock-colon.blink { animation: blink 2s ease-in-out infinite; }
  @keyframes blink {
    0%, 50% { opacity: 0.85; }
    25% { opacity: 0.3; }
  }

  /* === Hairline divider === */
  .hairline {
    position: absolute;
    top: 88px; left: 28px; right: 28px;
    height: 1px;
    background: var(--hairline);
    z-index: 2;
  }
  .hairline::before {
    content: '';
    position: absolute;
    top: 3px; left: 0; right: 0;
    height: 1px;
    background: var(--hairline);
    opacity: 0.5;
  }

  /* === Tab content area === */
  .content {
    position: absolute;
    top: 96px; left: 28px; right: 28px;
    bottom: 38px;
    z-index: 2;
    overflow: hidden;
  }

  .tab-panel {
    position: absolute; inset: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
  }
  .tab-panel.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .panel-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.45em;
    color: var(--ink);
  }
  .panel-title-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* === Stocks === */
  .stocks-summary {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 12px;
  }
  .summary-block { display: flex; flex-direction: column; gap: 2px; }
  .summary-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
  }
  .summary-value {
    font-family: 'Source Serif 4', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    font-feature-settings: 'lnum', 'tnum';
  }
  .summary-value.up { color: var(--up); }
  .summary-value.down { color: var(--down); }

  .stocks-table {
    width: 100%;
    font-family: 'Noto Serif TC', serif;
  }
  .stocks-row {
    display: grid;
    grid-template-columns: 50px minmax(0, 1fr) 56px 64px 64px 56px 76px;
    align-items: center;
    gap: 6px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--hairline);
    font-size: 13px;
  }
  .stocks-row:last-child { border-bottom: none; }
  .stocks-row.head {
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
    padding: 4px 0;
  }
  .stk-code {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    color: var(--ink-soft);
    font-feature-settings: 'lnum';
  }
  .stk-name { color: var(--ink); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .stk-num {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    text-align: right;
    color: var(--ink);
  }
  .stk-num.up { color: var(--up); font-weight: 600; }
  .stk-num.down { color: var(--down); font-weight: 600; }

  /* === GA === */
  .ga-split {
    display: grid;
    grid-template-columns: 1.45fr 1fr;
    gap: 0;
    height: 100%;
  }
  .ga-section { display: flex; flex-direction: column; min-width: 0; }
  .ga-section.cum { padding-left: 22px; border-left: 1px solid var(--hairline); }
  .ga-section.live { padding-right: 22px; }
  .ga-section-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ga-section-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--ink);
    font-weight: 500;
  }
  .ga-section-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .ga-live-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .ga-live-stats .ga-stat-num { font-size: 30px; }
  .ga-stat-pair { display: flex; flex-direction: column; gap: 1px; }
  .ga-stat-en {
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
  }
  .ga-stat-zh {
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.18em;
    font-family: 'Noto Serif TC', serif;
  }
  .ga-stat-num {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 38px;
    color: var(--ink);
    line-height: 1;
    font-feature-settings: 'lnum', 'tnum';
    margin-top: 4px;
    letter-spacing: -0.01em;
  }
  .ga-pulse-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--stamp);
    margin-right: 8px;
    animation: pulse 1.4s ease-in-out infinite;
    vertical-align: middle;
    transform: translateY(-3px);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translateY(-3px) scale(1); }
    50% { opacity: 0.4; transform: translateY(-3px) scale(0.85); }
  }

  .ga-paths-head {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 4px;
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
  }
  .ga-path-row {
    display: grid;
    grid-template-columns: 1fr 48px;
    align-items: baseline;
    padding: 3px 0;
    font-size: 12px;
    border-bottom: 1px dashed var(--hairline);
  }
  .ga-path-row:last-child { border-bottom: none; }
  .ga-path-name {
    font-family: 'Source Serif 4', serif;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ga-path-views {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    text-align: right;
    color: var(--ink);
    font-weight: 600;
  }

  .ga-cum-list { display: flex; flex-direction: column; }
  .ga-cum-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px dashed var(--hairline);
  }
  .ga-cum-row:last-child { border-bottom: none; }
  .ga-cum-left { display: flex; flex-direction: column; gap: 1px; }
  .ga-cum-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--ink);
    letter-spacing: 0.12em;
  }
  .ga-cum-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .ga-cum-num {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
    letter-spacing: -0.01em;
  }
  .ga-cum-num.money { color: var(--stamp); }
  .ga-cum-num .unit {
    font-size: 11px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-left: 1px;
  }
  .ga-cum-num .currency {
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-right: 2px;
    font-style: italic;
  }

  /* === Weather === */
  .weather-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100%;
  }
  .weather-city {
    display: flex;
    flex-direction: column;
    padding-right: 22px;
  }
  .weather-city + .weather-city {
    padding-left: 22px;
    padding-right: 0;
    border-left: 1px solid var(--hairline);
  }
  .weather-loc-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .weather-loc {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    letter-spacing: 0.4em;
    color: var(--ink);
    font-weight: 500;
  }
  .weather-loc-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .weather-cond {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.12em;
  }
  .weather-temp-row {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-top: 4px;
  }
  .weather-temp {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 68px;
    line-height: 0.95;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
    letter-spacing: -0.04em;
    position: relative;
    display: inline-block;
  }
  .weather-temp .deg {
    position: absolute;
    top: 4px;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .weather-hilo {
    font-family: 'Source Serif 4', serif;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    font-feature-settings: 'lnum', 'tnum';
    padding-bottom: 4px;
    line-height: 1.5;
  }
  .weather-hilo .sep { color: var(--ink-faint); margin: 0 4px; }
  .weather-big-icon {
    color: var(--ink);
    margin-left: auto;
    padding-bottom: 4px;
  }

  .weather-hourly {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-top: 10px;
    border-top: 1px dashed var(--hairline);
    padding-top: 8px;
  }
  .hour-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .hour-time {
    font-family: 'Source Serif 4', serif;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    font-feature-settings: 'lnum';
  }
  .hour-icon {
    width: 18px; height: 18px;
    color: var(--ink);
  }
  .hour-temp {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
  }
  .hour-rain {
    font-family: 'Source Serif 4', serif;
    font-size: 9px;
    color: var(--stamp);
    font-feature-settings: 'lnum';
    font-style: italic;
  }

  /* === Calendar === */
  .cal-now {
    background: var(--bg-deep);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100%' height='100%' fill='%23e8e0cc'/><line x1='0' y1='0' x2='100' y2='100' stroke='%23d4cdbf' stroke-width='0.3' opacity='0.4'/></svg>");
    border: 1px solid var(--hairline);
    padding: 14px 20px;
    position: relative;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cal-now::before {
    content: '即將';
    position: absolute;
    top: -8px; left: 16px;
    background: var(--bg);
    padding: 0 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--stamp);
    font-weight: 500;
  }
  .cal-event-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .cal-event-meta {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 460px;
  }
  .cal-countdown {
    text-align: right;
    font-family: 'Source Serif 4', serif;
  }
  .cal-cd-num {
    font-size: 48px;
    font-weight: 700;
    color: var(--stamp);
    line-height: 1;
    font-feature-settings: 'lnum', 'tnum';
  }
  .cal-cd-num.cal-cd-tmr {
    font-family: 'Noto Serif TC', serif;
    font-size: 36px;
    letter-spacing: 0.08em;
  }
  .cal-cd-unit {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.4em;
    font-style: normal;
    margin-top: 2px;
  }

  .cal-list { display: flex; flex-direction: column; gap: 6px; }
  .cal-row {
    display: grid;
    grid-template-columns: 90px minmax(0, 1fr) minmax(0, 1.1fr);
    align-items: center;
    gap: 12px;
    padding: 4px 0;

const { useState, useEffect, useRef, useMemo } = React;

// ---- auto-scale ----
function fitStage() {
  const stage = document.getElementById('stage');
  if (!stage) return;
  const s = Math.min(window.innerWidth / 736, window.innerHeight / 414);
  stage.style.transform = `scale(${s})`;
}
window.addEventListener('resize', fitStage);
window.addEventListener('load', fitStage);
fitStage();

// Strip the trailing site-name suffix that ZhgChgLi pages add to their <title>.
// e.g. "Apple Watch 米蘭錶帶開箱…  | ZhgChgLi Tech & Travel" → "Apple Watch 米蘭錶帶開箱…"
function stripSiteSuffix(title) {
  if (!title) return title;
  return String(title).replace(/\s*[|｜]\s*ZhgChgLi[^|｜]*$/, "").trim();
}

// =================================================================
// FLIP CLOCK
// =================================================================
function FlipDigit({ value, size = 'lg', duration = 640 }) {
  const [current, setCurrent] = useState(value);
  const [previous, setPrevious] = useState(value);
  const [flipping, setFlipping] = useState(false);

  useEffect(() => {
    if (value !== current) {
      setPrevious(current);
      setFlipping(true);
      const t = setTimeout(() => {
        setCurrent(value);
        setFlipping(false);
      }, duration);
      return () => clearTimeout(t);
    }
  }, [value, current, duration]);

  const next = value;
  const cls = `flip-card ${size === 'sm' ? 'sec' : ''}`;

  return (
    <div className={cls}>
      <div className="flip-half top"><span>{flipping ? next : current}</span></div>
      <div className="flip-half bottom"><span>{flipping ? previous : current}</span></div>
      {flipping && (
        <>
          <div className="flip-flap flap-top" key={`t-${previous}-${next}`}><span>{previous}</span></div>
          <div className="flip-flap flap-bottom" key={`b-${previous}-${next}`}><span>{next}</span></div>
        </>
      )}
    </div>
  );
}

function FlipClock({ now }) {
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const h1 = Math.floor(h / 10), h2 = h % 10;
  const m1 = Math.floor(m / 10), m2 = m % 10;
  const s1 = Math.floor(s / 10), s2 = s % 10;
  return (
    <div className="clock">
      <div className="flip-group">
        <FlipDigit value={h1} />
        <FlipDigit value={h2} />
      </div>
      <div className="clock-colon">:</div>
      <div className="flip-group">
        <FlipDigit value={m1} />
        <FlipDigit value={m2} />
      </div>
      <div className="clock-colon">:</div>
      <div className="flip-group">
        <FlipDigit value={s1} duration={360} />
        <FlipDigit value={s2} duration={360} />
      </div>
    </div>
  );
}

  if (type === 'sun')    return <svg {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>;
  if (type === 'cloud')  return <svg {...props}><path d="M7 18a4 4 0 010-8 6 6 0 0111.5 1.5A4 4 0 0117 18H7z"/></svg>;
  if (type === 'rain')   return <svg {...props}><path d="M7 14a4 4 0 010-8 6 6 0 0111.5 1.5A4 4 0 0117 14H7z"/><path d="M9 18l-1 3M13 18l-1 3M17 18l-1 3"/></svg>;
  if (type === 'partly') return <svg {...props}><circle cx="8" cy="9" r="3"/><path d="M11 16a3 3 0 010-6 5 5 0 019.5 1.5A3 3 0 0119 16h-8z"/></svg>;
  return null;
}

function CalendarPanel({ data }) {
  const CAL_EVENTS = data?.calendar?.events?.length ? data.calendar.events : CAL_FALLBACK;
  const todayEvents = CAL_EVENTS.filter(e => e.day === 'today');
  const tomorrowEvents = CAL_EVENTS.filter(e => e.day === 'tomorrow');
  // Events without a `day` tag (fallback demo data) → treated as today.
  const undatedEvents = CAL_EVENTS.filter(e => !e.day);
  const todayLike = todayEvents.length ? todayEvents : undatedEvents;

  // Featured "即將" — today's next event; if none, tomorrow's first.
  const next = todayLike[0] || tomorrowEvents[0];
  const isTomorrow = !todayLike.length && !!tomorrowEvents.length;
  // List below — rest of the same day as the featured event.
  const rest = isTomorrow ? tomorrowEvents.slice(1) : todayLike.slice(1);

  const headerCount = todayLike.length || tomorrowEvents.length;
  const headerLabel = isTomorrow
    ? `Tomorrow · ${headerCount} event${headerCount === 1 ? '' : 's'}`
    : `Today · ${headerCount} event${headerCount === 1 ? '' : 's'}`;

  return (
    <div className="tab-panel-inner">
      <div className="panel-head">
        <span className="panel-title">行　事　曆</span>
        <span className="panel-title-en">{headerLabel}</span>
      </div>
      {next ? (
        <div className={`cal-now ${isTomorrow ? 'is-tomorrow' : ''}`}>
          <div>
            <div className="cal-event-title">{next.name}</div>
            <div className="cal-event-meta">{next.time} &nbsp;·&nbsp; {next.loc || '—'}</div>
          </div>
          <div className="cal-countdown">
            {isTomorrow ? (
              <>
                <div className="cal-cd-num cal-cd-tmr">明日</div>
                <div className="cal-cd-unit">tomorrow</div>
              </>
            ) : (
              <>
                <div className="cal-cd-num">{Math.max(0, next.minutesUntil ?? 0)}</div>
                <div className="cal-cd-unit">分　鐘　後</div>
              </>
            )}
          </div>
        </div>
      ) : (
        <div className="cal-now">
          <div>
            <div className="cal-event-title">最近沒有行程</div>
            <div className="cal-event-meta">enjoy a slow day · ☕</div>
          </div>
        </div>
      )}
      <div className="cal-list">
        {rest.map((e, i) => (
          <div className="cal-row" key={i}>
            <span className="cal-row-time">{e.time}</span>
            <span className="cal-row-name">{e.name}</span>
            <span className="cal-row-loc">{e.loc}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

const CD_FALLBACK = [
  { name: '出國・京都賞楓',      date: '2026-11-12', target: '2026-11-12' },

  { name: '入職滿三年 · Day',    date: '2023-08-15', target: '2023-08-15', past: true },
];

function daysBetween(target, today) {
  const t = new Date(target);
  const d = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  return Math.round((t - d) / 86400000);
}

function CountdownPanel({ now, data }) {
  const CD_EVENTS = data?.countdown?.events?.length
    ? data.countdown.events.map(e => ({ ...e, date: e.target }))
    : CD_FALLBACK;
  return (
    <div className="tab-panel-inner">
      <div className="panel-head">
        <span className="panel-title">倒　數　日</span>
        <span className="panel-title-en">D-Day · counting</span>
      </div>
      <div className="cd-grid">
        {CD_EVENTS.map((e, i) => {
          const diff = daysBetween(e.target, now);
          const isPast = diff < 0;
          const num = Math.abs(diff);
          return (
            <div className="cd-item" key={i}>
              <div className={`cd-stamp ${isPast ? 'past' : ''}`}>
                <div className="cd-num">{num}</div>
                <div className="cd-day-label">{isPast ? 'PAST' : 'D-DAY'}</div>
              </div>
              <div className="cd-info">
                <div className="cd-name">{e.name}</div>
                <div className="cd-date">{e.date}{isPast ? ` · 已過 ${num} 天` : ` · 還有 ${num} 天`}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const TABS = [
  { id: 'stocks',  label: '持　股',     en: 'STOCKS',     Comp: StocksPanel },
  { id: 'ga',      label: '流　量',     en: 'TRAFFIC',    Comp: GAPanel },
  { id: '404',     label: '未尋獲',     en: '404',        Comp: NotFoundPanel },
  { id: 'weather', label: '天　氣',     en: 'WEATHER',    Comp: WeatherPanel },
  { id: 'cal',     label: '行事曆',     en: 'CALENDAR',   Comp: CalendarPanel },
  { id: 'cd',      label: '倒數日',     en: 'D-DAY',      Comp: CountdownPanel },
];
const TAB_DURATION = 15000;

const POLL_INTERVAL_MS = 60_000; // 1 min — cache itself refreshes every 5 min server-side

function SetupError({ kind }) {
  const titleZh = kind === "no-key" ? "金　鑰　未　設" : "資　料　無　法　取　得";
  const titleEn = kind === "no-key" ? "No dashboard key configured" : "Empty response from server";
  return (
    <div className="setup-error">
      <div className="se-stamp">未　驗　證</div>
      <div className="se-title">{titleZh}</div>
      <div className="se-desc" style={{fontStyle:'italic'}}>{titleEn}</div>
      {kind === "no-key" ? (
        <div className="se-desc">
          首次使用請於網址加上一次性 hash：<br/>
          <code>{location.origin + location.pathname}#key=&lt;your_key&gt;</code><br/>
          金鑰會自動存入 localStorage，下次直接訪問即可。
        </div>
      ) : (
        <div className="se-desc">
          後端回了空資料，可能是金鑰錯誤或服務暫時不可用。<br/>
          請確認 <code>localStorage.DASHBOARD_KEY</code> 與後端一致。
        </div>
      )}
    </div>
  );
}

function isEmptyPayload(d) {
  if (!d) return true;
  const keys = Object.keys(d);
  if (keys.length === 0) return true;
  // Server returns "{}" when unauthenticated; otherwise payload always has generatedAt.
  return !d.generatedAt;
}

function App() {
  const [now, setNow] = useState(new Date());
  const [activeIdx, setActiveIdx] = useState(0);
  const [progress, setProgress] = useState(0);
  const [hasKey] = useState(() => !!localStorage.getItem("DASHBOARD_KEY"));
  const [authFailed, setAuthFailed] = useState(false);
  const [data, setData] = useState(window.DATA || {});

  // tick clock
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  // fetch data from GAS JSON endpoint; SW does stale-while-revalidate caching
  useEffect(() => {
    if (!hasKey) return;
    const key = localStorage.getItem("DASHBOARD_KEY");
    const url = GAS_URL + "?key=" + encodeURIComponent(key);

    const fetchData = async () => {
      try {
        const res = await fetch(url, { redirect: "follow" });
        if (!res.ok) { console.error("[fetch]", res.status); return; }
        const json = await res.json();
        if (isEmptyPayload(json)) {
          setAuthFailed(true);
          return;
        }
        setAuthFailed(false);
        setData(json);
        try { localStorage.setItem("DASHBOARD_DATA", JSON.stringify(json)); } catch (e) {}
      } catch (e) { console.error("[fetch]", e); }
    };
    fetchData();
    const id = setInterval(fetchData, POLL_INTERVAL_MS);

    // SW pings clients when its background revalidate finishes — refetch to
    // pick up the freshly-cached response without waiting for the next poll.
    const onSwMsg = (e) => { if (e.data?.type === "data-updated") fetchData(); };
    navigator.serviceWorker?.addEventListener("message", onSwMsg);

    return () => {
      clearInterval(id);
      navigator.serviceWorker?.removeEventListener("message", onSwMsg);
    };
  }, []);

  // tab cycler
  useEffect(() => {
    const start = Date.now();
    const id = setInterval(() => {
      const elapsed = Date.now() - start;
      const p = Math.min(elapsed / TAB_DURATION, 1);
      setProgress(p);
      if (p >= 1) {
        setActiveIdx(i => (i + 1) % TABS.length);
      }
    }, 80);
    return () => clearInterval(id);
  }, [activeIdx]);

  const handleTabClick = (i) => {
    setActiveIdx(i);
  };

  if (!hasKey) return <SetupError kind="no-key" />;
  if (authFailed) return <SetupError kind="empty" />;

  return (
    <>
      <Header now={now} />
      <div className="hairline"></div>

      <div className="content">
        {TABS.map((T, i) => (
          <div className={`tab-panel ${i === activeIdx ? 'active' : ''}`} key={T.id}>
            <T.Comp now={now} data={data} />
          </div>
        ))}
      </div>

      <div className="footer">
        <div className="tabs">
          {TABS.map((T, i) => (
            <span
              key={T.id}
              className={`tab-label ${i === activeIdx ? 'active' : ''}`}
              onClick={() => handleTabClick(i)}
            >
              {T.label}
            </span>
          ))}
        </div>
        <span className="progress-num">{String(activeIdx + 1).padStart(2, '0')}/{String(TABS.length).padStart(2, '0')}</span>
        <div className="progress">
          <div className="progress-fill" style={{ width: `${progress * 100}%` }}></div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
