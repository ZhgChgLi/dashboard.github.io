<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f1ebdc">
<link rel="manifest" href="manifest.json">
<title>ZhgChgLi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>

<style>
  :root {
    --bg: #f1ebdc;
    --bg-deep: #e8e0cc;
    --ink: #2a2520;
    --ink-soft: #6b6358;
    --ink-faint: #9a9080;
    --hairline: #cdc3ae;
    --stamp: #a0382e;
    --stamp-deep: #7a2820;
    --up: #2d5a3d;
    --down: #b94a3a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #14110d;
    overflow: hidden;
    font-family: 'Noto Serif TC', 'Source Serif 4', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  #stage {
    position: relative;
    width: 100%; height: 100%;
  }

  #device {
    width: 100%; height: 100%;
    background: var(--bg);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.12  0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"),
      radial-gradient(ellipse at 30% 20%, rgba(255,250,235,0.5), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(160,56,46,0.04), transparent 60%);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.5),
      0 8px 24px rgba(0,0,0,0.3),
      inset 0 0 0 1px rgba(0,0,0,0.05);
    color: var(--ink);
  }

  /* deckle edge - subtle paper border imperfection */
  #device::before {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 60px rgba(120, 90, 50, 0.08);
    z-index: 1;
  }

  /* === Header === */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 88px;
    display: flex;
    align-items: stretch;
    padding: 14px 24px 0 28px;
    z-index: 2;
  }

  .date-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .date-line1 {
    font-size: 11px;
    letter-spacing: 0.32em;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-weight: 500;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
  }
  .date-line2 {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-family: 'Noto Serif TC', serif;
  }
  .date-num {
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
    font-feature-settings: 'lnum';
  }
  .date-num .slash {
    color: var(--ink-faint);
    font-weight: 400;
    margin: 0 2px;
  }
  .date-weekday {
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.15em;
    font-weight: 500;
  }
  .date-line3 {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    margin-top: 2px;
  }

  /* === Flip Clock === */
  .clock {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 4px;
  }
  .flip-group {
    display: flex;
    gap: 3px;
  }
  .flip-card {
    position: relative;
    width: 44px;
    height: 60px;
    perspective: 360px;
  }
  .flip-half {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    background: linear-gradient(180deg, #2f2920 0%, #221d18 100%);
    color: #f5efde;
    overflow: hidden;
    font-family: 'Source Serif 4', 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 60px;
    text-align: center;
    font-feature-settings: 'lnum', 'tnum';
  }
  .flip-half.top {
    top: 0;
    border-radius: 4px 4px 0 0;
    box-shadow: inset 0 -1px 0 #000, 0 1px 0 rgba(0,0,0,0.3);
  }
  .flip-half.top > span {
    display: block;
    line-height: 60px;
    transform: translateY(0);
  }
  .flip-half.bottom {
    bottom: 0;
    border-radius: 0 0 4px 4px;
    background: linear-gradient(180deg, #1d1814 0%, #2a2420 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .flip-half.bottom > span {
    display: block;
    line-height: 60px;
    transform: translateY(-30px);
  }
  .flip-flap {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    overflow: hidden;
    backface-visibility: hidden;
    color: #f5efde;
    font-family: 'Source Serif 4', 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 56px;
    text-align: center;
    font-feature-settings: 'lnum', 'tnum';
    z-index: 2;
  }
  .flip-flap.flap-top {
    top: 0;
    background: linear-gradient(180deg, #2f2920 0%, #221d18 100%);
    border-radius: 4px 4px 0 0;
    transform-origin: bottom;
    animation: flap-down 0.32s cubic-bezier(0.4, 0, 0.7, 0.2) forwards;
    box-shadow: inset 0 -1px 0 #000;
  }
  .flip-flap.flap-top > span { display: block; line-height: 60px; }
  .flip-flap.flap-bottom {
    bottom: 0;
    background: linear-gradient(180deg, #1d1814 0%, #2a2420 100%);
    border-radius: 0 0 4px 4px;
    transform-origin: top;
    transform: rotateX(90deg);
    animation: flap-up 0.32s cubic-bezier(0.3, 0.85, 0.6, 1) 0.32s forwards;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .flip-flap.flap-bottom > span { display: block; line-height: 60px; transform: translateY(-30px); }

  @keyframes flap-down {
    0%   { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flap-up {
    0%   { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  .clock-colon {
    color: var(--ink);
    font-family: 'Source Serif 4', serif;
    font-size: 38px;
    font-weight: 600;
    padding: 0 4px;
    line-height: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
  }
  .clock-colon.blink { animation: blink 2s ease-in-out infinite; }
  @keyframes blink {
    0%, 50% { opacity: 0.85; }
    25% { opacity: 0.3; }
  }

  /* === Hairline divider === */
  .hairline {
    position: absolute;
    top: 88px; left: 28px; right: 28px;
    height: 1px;
    background: var(--hairline);
    z-index: 2;
  }
  .hairline::before {
    content: '';
    position: absolute;
    top: 3px; left: 0; right: 0;
    height: 1px;
    background: var(--hairline);
    opacity: 0.5;
  }

  /* === Tab content area === */
  .content {
    position: absolute;
    top: 96px; left: 28px; right: 28px;
    bottom: 38px;
    z-index: 2;
    overflow: hidden;
  }

  .tab-panel {
    position: absolute; inset: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
  }
  .tab-panel.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .panel-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.45em;
    color: var(--ink);
  }
  .panel-title-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* === Stocks === */
  .stocks-summary {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 12px;
  }
  .summary-block { display: flex; flex-direction: column; gap: 2px; }
  .summary-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
  }
  .summary-value {
    font-family: 'Source Serif 4', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    font-feature-settings: 'lnum', 'tnum';
  }
  .summary-value.up { color: var(--up); }
  .summary-value.down { color: var(--down); }

  .stocks-table {
    width: 100%;
    font-family: 'Noto Serif TC', serif;
  }
  .stocks-row {
    display: grid;
    grid-template-columns: 50px minmax(0, 1fr) 56px 64px 64px 56px 76px;
    align-items: center;
    gap: 6px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--hairline);
    font-size: 13px;
  }
  .stocks-row:last-child { border-bottom: none; }
  .stocks-row.head {
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
    padding: 4px 0;
  }
  .stk-code {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    color: var(--ink-soft);
    font-feature-settings: 'lnum';
  }
  .stk-name { color: var(--ink); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .stk-num {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    text-align: right;
    color: var(--ink);
  }
  .stk-num.up { color: var(--up); font-weight: 600; }
  .stk-num.down { color: var(--down); font-weight: 600; }

  /* === GA === */
  .ga-split {
    display: grid;
    grid-template-columns: 1.45fr 1fr;
    gap: 0;
    height: 100%;
  }
  .ga-section { display: flex; flex-direction: column; min-width: 0; }
  .ga-section.cum { padding-left: 22px; border-left: 1px solid var(--hairline); }
  .ga-section.live { padding-right: 22px; }
  .ga-section-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ga-section-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--ink);
    font-weight: 500;
  }
  .ga-section-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .ga-live-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .ga-live-stats .ga-stat-num { font-size: 30px; }
  .ga-stat-pair { display: flex; flex-direction: column; gap: 1px; }
  .ga-stat-en {
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
  }
  .ga-stat-zh {
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.18em;
    font-family: 'Noto Serif TC', serif;
  }
  .ga-stat-num {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 38px;
    color: var(--ink);
    line-height: 1;
    font-feature-settings: 'lnum', 'tnum';
    margin-top: 4px;
    letter-spacing: -0.01em;
  }
  .ga-pulse-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--stamp);
    margin-right: 8px;
    animation: pulse 1.4s ease-in-out infinite;
    vertical-align: middle;
    transform: translateY(-3px);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translateY(-3px) scale(1); }
    50% { opacity: 0.4; transform: translateY(-3px) scale(0.85); }
  }

  .ga-paths-head {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 4px;
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
  }
  .ga-path-row {
    display: grid;
    grid-template-columns: 1fr 48px;
    align-items: baseline;
    padding: 3px 0;
    font-size: 12px;
    border-bottom: 1px dashed var(--hairline);
  }
  .ga-path-row:last-child { border-bottom: none; }
  .ga-path-name {
    font-family: 'Source Serif 4', serif;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ga-path-views {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    text-align: right;
    color: var(--ink);
    font-weight: 600;
  }

  .ga-cum-list { display: flex; flex-direction: column; }
  .ga-cum-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px dashed var(--hairline);
  }
  .ga-cum-row:last-child { border-bottom: none; }
  .ga-cum-left { display: flex; flex-direction: column; gap: 1px; }
  .ga-cum-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--ink);
    letter-spacing: 0.12em;
  }
  .ga-cum-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .ga-cum-num {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
    letter-spacing: -0.01em;
  }
  .ga-cum-num.money { color: var(--stamp); }
  .ga-cum-num .unit {
    font-size: 11px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-left: 1px;
  }
  .ga-cum-num .currency {
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-right: 2px;
    font-style: italic;
  }

  /* === Weather === */
  .weather-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100%;
  }
  .weather-city {
    display: flex;
    flex-direction: column;
    padding-right: 22px;
  }
  .weather-city + .weather-city {
    padding-left: 22px;
    padding-right: 0;
    border-left: 1px solid var(--hairline);
  }
  .weather-loc-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .weather-loc {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    letter-spacing: 0.4em;
    color: var(--ink);
    font-weight: 500;
  }
  .weather-loc-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .weather-cond {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.12em;
  }
  .weather-temp-row {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-top: 4px;
  }
  .weather-temp {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 68px;
    line-height: 0.95;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
    letter-spacing: -0.04em;
    position: relative;
    display: inline-block;
  }
  .weather-temp .deg {
    position: absolute;
    top: 4px;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .weather-hilo {
    font-family: 'Source Serif 4', serif;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    font-feature-settings: 'lnum', 'tnum';
    padding-bottom: 4px;
    line-height: 1.5;
  }
  .weather-hilo .sep { color: var(--ink-faint); margin: 0 4px; }
  .weather-big-icon {
    color: var(--ink);
    margin-left: auto;
    padding-bottom: 4px;
  }

  .weather-hourly {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-top: 10px;
    border-top: 1px dashed var(--hairline);
    padding-top: 8px;
  }
  .hour-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .hour-time {
    font-family: 'Source Serif 4', serif;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    font-feature-settings: 'lnum';
  }
  .hour-icon {
    width: 18px; height: 18px;
    color: var(--ink);
  }
  .hour-temp {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
  }
  .hour-rain {
    font-family: 'Source Serif 4', serif;
    font-size: 9px;
    color: var(--stamp);
    font-feature-settings: 'lnum';
    font-style: italic;
  }

  /* === Calendar all-day strip — pinned to top of panel === */
  .cal-allday {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 5px 12px 5px 10px;
    margin-bottom: 10px;
    background: rgba(160, 56, 46, 0.05);
    border-left: 2px solid var(--stamp);
    overflow: hidden;
  }
  .cal-allday-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--stamp);
    flex-shrink: 0;
    font-weight: 500;
  }
  .cal-allday-list {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--ink);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .cal-allday-tmr {
    color: var(--ink-faint);
    font-style: italic;
    margin-right: 6px;
    font-size: 10px;
  }

  /* === Calendar === */
  .cal-now {
    background: var(--bg-deep);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><rect width='100%' height='100%' fill='%23e8e0cc'/><line x1='0' y1='0' x2='100' y2='100' stroke='%23d4cdbf' stroke-width='0.3' opacity='0.4'/></svg>");
    border: 1px solid var(--hairline);
    padding: 14px 20px;
    position: relative;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cal-now::before {
    content: '即將';
    position: absolute;
    top: -8px; left: 16px;
    background: var(--bg);
    padding: 0 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--stamp);
    font-weight: 500;
  }
  .cal-event-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .cal-event-meta {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

// Hard refresh: ask GAS to flush its caches, drop SW + browser caches, reload.
document.addEventListener('DOMContentLoaded', function () {
  var btn = document.getElementById('refresh-btn');
  if (!btn) return;
  btn.addEventListener('click', async function () {
    btn.classList.add('spinning');
    try {
      var key = localStorage.getItem('DASHBOARD_KEY');
      if (key) {
        var url = 'https://script.google.com/macros/s/AKfycbxJoTtqTisPq8ZjJvSBzqAkQ8UIVc5XS9JdbHggmV4vGQ45paDCXYpNNgQwEr7VPaPxGw/exec'
                + '?key=' + encodeURIComponent(key) + '&refresh=1';
        try { await fetch(url, { redirect: 'follow' }); } catch (e) { console.warn('[refresh] gas flush failed', e); }
      }
      if (navigator.serviceWorker) {
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function (r) { return r.unregister(); }));
      }
      if (window.caches) {
        var names = await caches.keys();
        await Promise.all(names.map(function (n) { return caches.delete(n); }));
      }
      try { localStorage.removeItem('DASHBOARD_DATA'); } catch (e) {}
    } finally {
      location.reload();
    }
  });
});

<script data-cfasync="false" type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// Render a "next refresh in mm:ss" label given an epoch-ms expiry timestamp.
// Fed by the parent <App>'s `now` clock so it ticks every second.
function refreshCountdown(refreshAt, now) {
  if (!refreshAt) return null;
  const ms = refreshAt - now.getTime();
  if (ms <= 0) return "更新中…";
  const total = Math.ceil(ms / 1000);
  const m = Math.floor(total / 60), s = total % 60;
  return `下次更新 ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

// Decode any %XX escapes so paths read naturally; CSS handles the head-trim.
function decodePath(s) {
  if (!s) return s;
  try { return decodeURIComponent(s); } catch (e) { return s; }
}

// Strip the trailing site-name suffix that ZhgChgLi pages add to their <title>.
// e.g. "Apple Watch 米蘭錶帶開箱…  | ZhgChgLi Tech & Travel" → "Apple Watch 米蘭錶帶開箱…"
function stripSiteSuffix(title) {
  if (!title) return title;
  return String(title).replace(/\s*[|｜]\s*ZhgChgLi[^|｜]*$/, "").trim();
}

// =================================================================
// FLIP CLOCK
// =================================================================
function FlipDigit({ value, size = 'lg', duration = 640 }) {
  const [current, setCurrent] = useState(value);
  const [previous, setPrevious] = useState(value);
  const [flipping, setFlipping] = useState(false);

  useEffect(() => {
    if (value !== current) {
      setPrevious(current);
      setFlipping(true);
      const t = setTimeout(() => {
        setCurrent(value);
        setFlipping(false);
      }, duration);
      return () => clearTimeout(t);
    }
  }, [value, current, duration]);

  const next = value;
  const cls = `flip-card ${size === 'sm' ? 'sec' : ''}`;

  return (
    <div className={cls}>
      <div className="flip-half top"><span>{flipping ? next : current}</span></div>
      <div className="flip-half bottom"><span>{flipping ? previous : current}</span></div>
      {flipping && (
        <>
          <div className="flip-flap flap-top" key={`t-${previous}-${next}`}><span>{previous}</span></div>
          <div className="flip-flap flap-bottom" key={`b-${previous}-${next}`}><span>{next}</span></div>
        </>
      )}
    </div>
  );
}

function FlipClock({ now }) {
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const h1 = Math.floor(h / 10), h2 = h % 10;
  const m1 = Math.floor(m / 10), m2 = m % 10;
  const s1 = Math.floor(s / 10), s2 = s % 10;
  return (
    <div className="clock">
      <div className="flip-group">
        <FlipDigit value={h1} />
        <FlipDigit value={h2} />
      </div>
      <div className="clock-colon">:</div>
      <div className="flip-group">
        <FlipDigit value={m1} />
        <FlipDigit value={m2} />
      </div>
      <div className="clock-colon">:</div>
      <div className="flip-group">
        <FlipDigit value={s1} duration={360} />
        <FlipDigit value={s2} duration={360} />
      </div>
    </div>
  );
}

  if (type === 'sun')    return <svg {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>;

function CalendarPanel({ data }) {
  const CAL_EVENTS = data?.calendar?.events || [];

  // Pull all-day events out — they live in their own strip, never in 即將.
  const allDayEvents = CAL_EVENTS.filter(e => e.isAllDay);
  const timedEvents = CAL_EVENTS.filter(e => !e.isAllDay);

  const todayEvents = timedEvents.filter(e => e.day === 'today');
  const tomorrowEvents = timedEvents.filter(e => e.day === 'tomorrow');
  const undatedEvents = timedEvents.filter(e => !e.day);
  const todayLike = todayEvents.length ? todayEvents : undatedEvents;

  const next = todayLike[0] || tomorrowEvents[0];
  const isTomorrow = !todayLike.length && !!tomorrowEvents.length;
  const rest = isTomorrow ? tomorrowEvents.slice(1) : todayLike.slice(1);

  const headerCount = todayLike.length || tomorrowEvents.length;
  const headerLabel = isTomorrow
    ? `Tomorrow · ${headerCount} timed event${headerCount === 1 ? '' : 's'}`
    : `Today · ${headerCount} timed event${headerCount === 1 ? '' : 's'}`;

  return (
    <div className="tab-panel-inner">
      <div className="panel-head">
        <span className="panel-title">行　事　曆</span>
        <span className="panel-title-en">{headerLabel}</span>
      </div>
      {allDayEvents.length > 0 && (
        <div className="cal-allday" title={allDayEvents.map(e => e.name).join(' · ')}>
          <span className="cal-allday-label">全　日</span>
          <span className="cal-allday-list">
            {allDayEvents.map((e, i) => (
              <React.Fragment key={i}>
                {i > 0 && <span style={{color: 'var(--ink-faint)', margin: '0 6px'}}>·</span>}
                {e.day === 'tomorrow' && <span className="cal-allday-tmr">明日</span>}
                {e.name}
              </React.Fragment>
            ))}
          </span>
        </div>
      )}
      {next ? (
        <div className={`cal-now ${isTomorrow ? 'is-tomorrow' : ''}`}>
          <div>
            <div className="cal-event-title">{next.name}</div>
            <div className="cal-event-meta">{next.time} &nbsp;·&nbsp; {next.loc || '—'}</div>
          </div>
          <div className="cal-countdown">
            {isTomorrow ? (
              <>
                <div className="cal-cd-num cal-cd-tmr">明日</div>
                <div className="cal-cd-unit">tomorrow</div>
              </>
            ) : (
              <>
                <div className="cal-cd-num">{Math.max(0, next.minutesUntil ?? 0)}</div>
                <div className="cal-cd-unit">分　鐘　後</div>
              </>
            )}
          </div>
        </div>
      ) : allDayEvents.length === 0 ? (
        <div className="cal-now">
          <div>
            <div className="cal-event-title">最近沒有行程</div>
            <div className="cal-event-meta">enjoy a slow day · ☕</div>
          </div>
        </div>
      ) : null}
      <div className="cal-list">
        {rest.map((e, i) => (
          <div className="cal-row" key={i}>
            <span className="cal-row-time">{e.time}</span>
            <span className="cal-row-name">{e.name}</span>
            <span className="cal-row-loc">{e.loc}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// =================================================================
// TAB 5 — COUNTDOWN / D-DAY
// =================================================================
function daysBetween(target, today) {
  const t = new Date(target);
  const d = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  return Math.round((t - d) / 86400000);
}

// Floor-to-month elapsed since `origDate` (e.g. birthday) → "X 年 Y 個月".
function yearsMonthsSince(origDate, today) {
  if (!origDate) return null;
  const o = new Date(origDate);
  if (isNaN(o)) return null;
  let years = today.getFullYear() - o.getFullYear();
  let months = today.getMonth() - o.getMonth();
  if (today.getDate() < o.getDate()) months -= 1;
  if (months < 0) { years -= 1; months += 12; }
  if (years < 0) return null;
  return { years, months };
}

function CountdownPanel({ now, data }) {
  const CD_EVENTS = (data?.countdown?.events || []).map(e => ({ ...e, date: e.target }));
  return (
    <div className="tab-panel-inner">
      <div className="panel-head">
        <span className="panel-title">倒　數　日</span>
        <span className="panel-title-en">D-Day · counting</span>
      </div>
      <div className="cd-grid">
        {CD_EVENTS.map((e, i) => {
          const diff = daysBetween(e.target, now);
          const isPast = diff < 0;
          const num = Math.abs(diff);
          const elapsed = e.repeat === 'yearly' ? yearsMonthsSince(e.origDate, now) : null;
          return (
            <div className="cd-item" key={i}>
              <div className={`cd-stamp ${isPast ? 'past' : ''}`}>
                <div className="cd-num">{num}</div>
                <div className="cd-day-label">{isPast ? 'PAST' : 'D-DAY'}</div>
              </div>
              <div className="cd-info">
                <div className="cd-name">{e.name}</div>
                <div className="cd-date">{e.date}{isPast ? ` · 已過 ${num} 天` : ` · 還有 ${num} 天`}</div>
                {elapsed && (
                  <div className="cd-elapsed">已經過了 {elapsed.years} 年 {elapsed.months} 個月</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// =================================================================
// MAIN APP
// =================================================================
const TABS = [
  { id: 'stocks',  label: '持　股',     en: 'STOCKS',     Comp: StocksPanel,
    // Skip auto-cycle between 07:00–21:00 local time (markets open / busy hours);
    // outside that window the cycler will land on stocks normally.
    isEmpty: () => { const h = new Date().getHours(); return h >= 7 && h < 21; } },
  { id: 'ga',      label: '流　量',     en: 'TRAFFIC',    Comp: GAPanel,
    // GA tab keeps rendering even with no realtime traffic (cumulative numbers
    // matter), so don't auto-skip.
    isEmpty: () => false },
  { id: '404',     label: ' 4 0 4',     en: '404',        Comp: NotFoundPanel,
    isEmpty: d => !d?.notFound?.rows?.length },
  { id: 'weather', label: '天　氣',     en: 'WEATHER',    Comp: WeatherPanel,
    isEmpty: d => !d?.weather?.cities?.length },
  { id: 'cal',     label: '行事曆',     en: 'CALENDAR',   Comp: CalendarPanel,
    isEmpty: d => !d?.calendar?.events?.length },
  { id: 'cd',      label: '倒數日',     en: 'D-DAY',      Comp: CountdownPanel,
    isEmpty: d => !d?.countdown?.events?.length },
];
const TAB_DURATION = 15000;

const POLL_INTERVAL_MS = 60_000; // 1 min — cache itself refreshes every 5 min server-side

function SetupError({ kind }) {
  const [val, setVal] = useState("");
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current?.focus(); }, []);

  const submit = (ev) => {
    ev.preventDefault();
    const k = val.trim();
    if (!k) return;
    localStorage.setItem("DASHBOARD_KEY", k);
    location.reload();
  };
  const reset = () => {
    localStorage.removeItem("DASHBOARD_KEY");
    localStorage.removeItem("DASHBOARD_DATA");
    location.reload();
  };

  const titleZh = kind === "no-key" ? "金　鑰　未　設" : "資　料　無　法　取　得";
  const titleEn = kind === "no-key" ? "Enter your dashboard key" : "Empty response from server";

  return (
    <div className="setup-error">
      <div className="se-stamp">未　驗　證</div>
      <div className="se-title">{titleZh}</div>
      <div className="se-desc" style={{fontStyle:'italic'}}>{titleEn}</div>

      <form onSubmit={submit} className="se-form">
        <input
          ref={inputRef}
          type="password"
          autoComplete="off"
          spellCheck={false}
          placeholder="dashboard key"
          value={val}
          onChange={(e) => setVal(e.target.value)}
        />
        <button type="submit">送　出</button>
      </form>

      {kind === "no-key" ? (
        <div className="se-desc">
          也可從網址帶入一次：<code>?key=&lt;key&gt;</code> 或 <code>#key=&lt;key&gt;</code><br/>
          送出後金鑰存入 localStorage，PWA 加到主畫面也能用。
        </div>
      ) : (
        <div className="se-desc">
          後端回了空資料，可能是金鑰錯誤或服務暫時不可用。<br/>
          <a href="#" onClick={(e) => { e.preventDefault(); reset(); }}>清除金鑰並重新輸入</a>
        </div>
      )}
    </div>
  );
}

function isEmptyPayload(d) {
  if (!d) return true;
  const keys = Object.keys(d);
  if (keys.length === 0) return true;
  // Server returns "{}" when unauthenticated; otherwise payload always has generatedAt.
  return !d.generatedAt;
}

function App() {
  const [now, setNow] = useState(new Date());
  const [activeIdx, setActiveIdx] = useState(0);
  const [progress, setProgress] = useState(0);
  const [hasKey] = useState(() => !!localStorage.getItem("DASHBOARD_KEY"));
  const [authFailed, setAuthFailed] = useState(false);
  const [data, setData] = useState(window.DATA || {});
  const [netError, setNetError] = useState(null); // { msg } | null

  // tick clock
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  // fetch data from GAS JSON endpoint; SW does stale-while-revalidate caching
  useEffect(() => {
    if (!hasKey) return;
    const key = localStorage.getItem("DASHBOARD_KEY");
    const url = GAS_URL + "?key=" + encodeURIComponent(key);

    const fetchData = async () => {
      try {
        const res = await fetch(url, { redirect: "follow" });
        if (!res.ok) {
          console.error("[fetch]", res.status);
          setNetError({ msg: `HTTP ${res.status}` });
          return;
        }
        const json = await res.json();
        if (isEmptyPayload(json)) {
          setAuthFailed(true);
          return;
        }
        setAuthFailed(false);
        setNetError(null);
        setData(json);
        try { localStorage.setItem("DASHBOARD_DATA", JSON.stringify(json)); } catch (e) {}
      } catch (e) {
        console.error("[fetch]", e);
        setNetError({ msg: String(e?.message || e || "network error") });
      }
    };
    fetchData();
    const id = setInterval(fetchData, POLL_INTERVAL_MS);

    // SW tells us when it served a stale (cached) response because the
    // network failed — show a chip so the user knows the data is from cache.
    const onSwMsg = (e) => {
      if (e.data?.type === "data-stale") {
        setNetError({ msg: "資料來自快取（網路問題）" });
      }
    };
    navigator.serviceWorker?.addEventListener("message", onSwMsg);

    return () => {
      clearInterval(id);
      navigator.serviceWorker?.removeEventListener("message", onSwMsg);
    };
  }, []);

  // tab cycler — skips tabs whose isEmpty(data) is true. Read data via ref
  // so a fresh fetch every minute doesn't reset the 15s tab timer.
  const dataRef = useRef(data);
  useEffect(() => { dataRef.current = data; }, [data]);
  useEffect(() => {
    const start = Date.now();
    const id = setInterval(() => {
      const elapsed = Date.now() - start;
      const p = Math.min(elapsed / TAB_DURATION, 1);
      setProgress(p);
      if (p >= 1) {
        setActiveIdx(i => {
          for (let n = 1; n <= TABS.length; n++) {
            const next = (i + n) % TABS.length;
            if (!TABS[next].isEmpty?.(dataRef.current)) return next;
          }
          return i;
        });
      }
    }, 80);
    return () => clearInterval(id);
  }, [activeIdx]);

  const handleTabClick = (i) => {
    setActiveIdx(i);
  };

  if (!hasKey) return <SetupError kind="no-key" />;
  if (authFailed) return <SetupError kind="empty" />;

  return (
    <>
      <Header now={now} />
      <div className="hairline"></div>
      {netError && (
        <div className="net-chip" title={netError.msg}>
          資料異常 · {netError.msg.length > 30 ? netError.msg.slice(0, 30) + "…" : netError.msg}
        </div>
      )}

      <div className="content">
        {TABS.map((T, i) => (
          <div className={`tab-panel ${i === activeIdx ? 'active' : ''}`} key={T.id}>
            <T.Comp now={now} data={data} />
          </div>
        ))}
      </div>

      <div className="footer">
        <div className="tabs">
          {TABS.map((T, i) => (
            <span
              key={T.id}
              className={`tab-label ${i === activeIdx ? 'active' : ''}`}
              onClick={() => handleTabClick(i)}
            >
              {T.label}
            </span>
          ))}
        </div>
        <span className="progress-num">{String(activeIdx + 1).padStart(2, '0')}/{String(TABS.length).padStart(2, '0')}</span>
        <div className="progress">
          <div className="progress-fill" style={{ width: `${progress * 100}%` }}></div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
