<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f1ebdc" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1612" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<title>ZhgChgLi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.0/babel.min.js"></script>

<style>
  :root {
    --bg: #f1ebdc;
    --bg-deep: #e8e0cc;
    --ink: #2a2520;
    --ink-soft: #6b6358;
    --ink-faint: #9a9080;
    --hairline: #cdc3ae;
    --stamp: #a0382e;
    --stamp-deep: #7a2820;
    --up: #2d5a3d;
    --down: #b94a3a;
    --device-noise-rgb: 0.16, 0.14, 0.12;
    --device-glow-1: rgba(255, 250, 235, 0.5);
    --device-glow-2: rgba(160, 56, 46, 0.04);
    --device-deckle: rgba(120, 90, 50, 0.08);
    --page-shadow: rgba(0, 0, 0, 0.5);
    --page-shadow-soft: rgba(0, 0, 0, 0.3);
    --device-bg-outer: #14110d;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1d1815;
      --bg-deep: #15110e;
      --ink: #ece1cd;
      --ink-soft: #a99c87;
      --ink-faint: #7d7264;
      --hairline: #3b342b;
      --stamp: #d97560;
      --stamp-deep: #b85a4a;
      --up: #82c596;
      --down: #e08a78;
      --device-noise-rgb: 0.95, 0.90, 0.80;
      --device-glow-1: rgba(255, 230, 180, 0.04);
      --device-glow-2: rgba(217, 117, 96, 0.05);
      --device-deckle: rgba(0, 0, 0, 0.5);
      --page-shadow: rgba(0, 0, 0, 0.7);
      --page-shadow-soft: rgba(0, 0, 0, 0.5);
      --device-bg-outer: #0a0807;
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100dvh; min-height: 100%;
    background: var(--bg);
    overflow: hidden;
    /* Lock the page: no pinch-zoom, no double-tap-zoom, no rubber-band
       scroll, no long-press text selection / image drag. Tap, swipe
       inside scrollable elements still work. */
    touch-action: manipulation;
    overscroll-behavior: none;
    -webkit-user-select: none;
            user-select: none;
    -webkit-touch-callout: none;
    font-family: 'Noto Serif TC', 'Source Serif 4', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* iOS Safari auto-inflates "long" body text (e.g. URL paths) when it
       thinks the user wants larger text, breaking our pixel-precise layout. */
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }

  #stage {
    position: relative;
    width: 100%; height: 100%;
  }

  #device {
    width: 100%; height: 100%;
    background: var(--bg);
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.16  0 0 0 0 0.14  0 0 0 0 0.12  0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"),
      radial-gradient(ellipse at 30% 20%, var(--device-glow-1), transparent 60%),
      radial-gradient(ellipse at 80% 90%, var(--device-glow-2), transparent 60%);
    position: relative;
    overflow: hidden;
    box-shadow:
      0 30px 80px var(--page-shadow),
      0 8px 24px var(--page-shadow-soft),
      inset 0 0 0 1px rgba(0,0,0,0.05);
    color: var(--ink);
  }
  @media (prefers-color-scheme: dark) {
    #device {
      /* lighter speckles on dark base — same SVG technique, brighter feColorMatrix */
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.90  0 0 0 0 0.80  0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>"),
        radial-gradient(ellipse at 30% 20%, var(--device-glow-1), transparent 60%),
        radial-gradient(ellipse at 80% 90%, var(--device-glow-2), transparent 60%);
    }
  }

  /* deckle edge - subtle paper border imperfection */
  #device::before {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 60px var(--device-deckle);
    z-index: 1;
  }

  /* === Header === */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: calc(104px + env(safe-area-inset-top));
    display: flex;
    flex-direction: column;
    padding: calc(10px + env(safe-area-inset-top)) calc(24px + env(safe-area-inset-right)) 0 calc(28px + env(safe-area-inset-left));
    z-index: 2;
    gap: 6px;
  }
  .header-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 22px;
    min-width: 0;
    overflow: hidden;
    flex: 0 0 auto;
  }
  .header-brand {
    font-family: 'Source Serif 4', serif;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--ink-soft);
    text-transform: uppercase;
    font-weight: 500;
    font-style: italic;
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .header-row {
    display: flex;
    align-items: stretch;
    flex: 1 1 auto;
    min-height: 0;
  }

  .date-block {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
  }
  .net-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: 1px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
  }
  .net-dot-online  { background: #4a8a4a; }
  .net-dot-stale   { background: #c79a3b; animation: net-dot-pulse 2.4s ease-in-out infinite; }
  .net-dot-offline { background: #a0382e; animation: net-dot-pulse 1.4s ease-in-out infinite; }
  @keyframes net-dot-pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }
  .date-line2 {
    display: flex;
    align-items: baseline;
    gap: 14px;
    font-family: 'Noto Serif TC', serif;
  }
  .date-num {
    font-size: 38px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
    font-feature-settings: 'lnum';
  }
  .date-num .slash {
    color: var(--ink-faint);
    font-weight: 400;
    margin: 0 2px;
  }
  .date-weekday {
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.15em;
    font-weight: 500;
  }
  .date-line3 {
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    margin-top: 2px;
  }

  /* === Flip Clock === */
  .clock {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 4px;
    /* Never let the date block shrink the clock — seconds would get
       clipped off the right edge (esp. on iPad portrait safe-area). */
    flex-shrink: 0;
  }
  .flip-group {
    display: flex;
    gap: 3px;
  }
  .flip-card {
    position: relative;
    width: 44px;
    height: 60px;
    perspective: 360px;
  }
  .flip-half {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    background: linear-gradient(180deg, #2f2920 0%, #221d18 100%);
    color: #f5efde;
    overflow: hidden;
    font-family: 'Source Serif 4', 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 56px;
    line-height: 60px;
    text-align: center;
    font-feature-settings: 'lnum', 'tnum';
  }
  .flip-half.top {
    top: 0;
    border-radius: 4px 4px 0 0;
    box-shadow: inset 0 -1px 0 #000, 0 1px 0 rgba(0,0,0,0.3);
  }
  .flip-half.top > span {
    display: block;
    line-height: 60px;
    transform: translateY(0);
  }
  .flip-half.bottom {
    bottom: 0;
    border-radius: 0 0 4px 4px;
    background: linear-gradient(180deg, #1d1814 0%, #2a2420 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .flip-half.bottom > span {
    display: block;
    line-height: 60px;
    transform: translateY(-30px);
  }
  .flip-flap {
    position: absolute;
    left: 0; right: 0;
    height: 30px;
    overflow: hidden;
    backface-visibility: hidden;
    color: #f5efde;
    font-family: 'Source Serif 4', 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 56px;
    text-align: center;
    font-feature-settings: 'lnum', 'tnum';
    z-index: 2;
  }
  .flip-flap.flap-top {
    top: 0;
    background: linear-gradient(180deg, #2f2920 0%, #221d18 100%);
    border-radius: 4px 4px 0 0;
    transform-origin: bottom;
    animation: flap-down 0.32s cubic-bezier(0.4, 0, 0.7, 0.2) forwards;
    box-shadow: inset 0 -1px 0 #000;
  }
  .flip-flap.flap-top > span { display: block; line-height: 60px; }
  .flip-flap.flap-bottom {
    bottom: 0;
    background: linear-gradient(180deg, #1d1814 0%, #2a2420 100%);
    border-radius: 0 0 4px 4px;
    transform-origin: top;
    transform: rotateX(90deg);
    animation: flap-up 0.32s cubic-bezier(0.3, 0.85, 0.6, 1) 0.32s forwards;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .flip-flap.flap-bottom > span { display: block; line-height: 60px; transform: translateY(-30px); }

  @keyframes flap-down {
    0%   { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }
  @keyframes flap-up {
    0%   { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }

  .clock-colon {
    color: var(--ink);
    font-family: 'Source Serif 4', serif;
    font-size: 38px;
    font-weight: 600;
    padding: 0 4px;
    line-height: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.85;
  }
  .clock-colon.blink { animation: blink 2s ease-in-out infinite; }
  @keyframes blink {
    0%, 50% { opacity: 0.85; }
    25% { opacity: 0.3; }
  }

  /* === Hairline divider === */
  .hairline {
    position: absolute;
    top: calc(104px + env(safe-area-inset-top));
    left: calc(28px + env(safe-area-inset-left));
    right: calc(28px + env(safe-area-inset-right));
    height: 1px;
    background: var(--hairline);
    z-index: 2;
  }
  .hairline::before {
    content: '';
    position: absolute;
    top: 3px; left: 0; right: 0;
    height: 1px;
    background: var(--hairline);
    opacity: 0.5;
  }

  /* === Tab content area === */
  .content {
    position: absolute;
    top: calc(112px + env(safe-area-inset-top));
    left: calc(28px + env(safe-area-inset-left));
    right: calc(28px + env(safe-area-inset-right));
    bottom: calc(38px + env(safe-area-inset-bottom));
    z-index: 2;
    overflow: hidden;
  }

  .tab-panel {
    position: absolute; inset: 0;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.45s ease, transform 0.45s ease;
    pointer-events: none;
  }
  .tab-panel.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .panel-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .panel-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.45em;
    color: var(--ink);
  }
  .panel-title-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  /* === Stocks === */
  .stocks-summary {
    display: flex;
    align-items: baseline;
    gap: 24px;
    margin-bottom: 12px;
  }
  .summary-block { display: flex; flex-direction: column; gap: 2px; }
  .summary-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
  }
  .summary-value {
    font-family: 'Source Serif 4', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
    font-feature-settings: 'lnum', 'tnum';
  }
  .summary-value.up { color: var(--up); }
  .summary-value.down { color: var(--down); }

  .stocks-table {
    width: 100%;
    font-family: 'Noto Serif TC', serif;
  }
  .stocks-row {
    display: grid;
    /* name · qty · cost · price · chg · earn */
    grid-template-columns: minmax(0, 1fr) 56px 64px 64px 56px 76px;
    align-items: center;
    gap: 6px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--hairline);
    font-size: 13px;
  }
  .stocks-row:last-child { border-bottom: none; }
  .stocks-row.head {
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.25em;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
    padding: 4px 0;
  }
  .stk-code {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    color: var(--ink-soft);
    font-feature-settings: 'lnum';
  }
  .stk-name { color: var(--ink); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .stk-num {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    text-align: right;
    color: var(--ink);
  }
  .stk-num.up { color: var(--up); font-weight: 600; }
  .stk-num.down { color: var(--down); font-weight: 600; }

  /* === GA === */
  .ga-split {
    display: grid;
    grid-template-columns: 1.45fr 1fr;
    gap: 0;
    height: 100%;
  }
  .ga-section { display: flex; flex-direction: column; min-width: 0; }
  .ga-section.cum { padding-left: 22px; border-left: 1px solid var(--hairline); }
  .ga-section.live { padding-right: 22px; }
  .ga-section-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 10px;
  }
  .ga-section-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--ink);
    font-weight: 500;
  }
  .ga-section-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }

  .ga-live-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .ga-live-stats .ga-stat-num { font-size: 30px; }
  .ga-stat-pair { display: flex; flex-direction: column; gap: 1px; }
  .ga-stat-en {
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
  }
  .ga-stat-zh {
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.18em;
    font-family: 'Noto Serif TC', serif;
  }
  .ga-stat-num {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 38px;
    color: var(--ink);
    line-height: 1;
    font-feature-settings: 'lnum', 'tnum';
    margin-top: 4px;
    letter-spacing: -0.01em;
  }
  .ga-pulse-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--stamp);
    margin-right: 8px;
    animation: pulse 1.4s ease-in-out infinite;
    vertical-align: middle;
    transform: translateY(-3px);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: translateY(-3px) scale(1); }
    50% { opacity: 0.4; transform: translateY(-3px) scale(0.85); }
  }

  .ga-paths-head {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 4px;
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
  }
  .ga-path-row {
    display: grid;
    grid-template-columns: 1fr 48px;
    align-items: baseline;
    padding: 3px 0;
    font-size: 12px;
    border-bottom: 1px dashed var(--hairline);
  }
  .ga-path-row:last-child { border-bottom: none; }
  .ga-path-name {
    font-family: 'Source Serif 4', serif;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ga-path-views {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    text-align: right;
    color: var(--ink);
    font-weight: 600;
  }

  .ga-cum-list { display: flex; flex-direction: column; }
  .ga-cum-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px dashed var(--hairline);
  }
  .ga-cum-row:last-child { border-bottom: none; }
  .ga-cum-left { display: flex; flex-direction: column; gap: 1px; }
  .ga-cum-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--ink);
    letter-spacing: 0.12em;
  }
  .ga-cum-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .ga-cum-num {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
    letter-spacing: -0.01em;
  }
  .ga-cum-num.money { color: var(--stamp); }
  .ga-cum-num .unit {
    font-size: 11px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-left: 1px;
  }
  .ga-cum-num .currency {
    font-size: 12px;
    font-weight: 400;
    color: var(--ink-soft);
    margin-right: 2px;
    font-style: italic;
  }
  /* Tiny ± badge attached to a stat — used by Traffic for "diff vs
     previous cycle / last week same day". */
  .ga-delta {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px 0;
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    letter-spacing: 0.08em;
    border: 1px solid currentColor;
    vertical-align: 4px;
    font-weight: 500;
    font-feature-settings: 'lnum', 'tnum';
    line-height: 1.4;
  }
  .ga-delta.up   { color: var(--up); }
  .ga-delta.down { color: var(--down); }
  .ga-delta.flat { color: var(--ink-faint); }

  /* === Weather === */
  .weather-split {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100%;
  }
  .weather-city {
    display: flex;
    flex-direction: column;
    padding-right: 22px;
  }
  .weather-city + .weather-city {
    padding-left: 22px;
    padding-right: 0;
    border-left: 1px solid var(--hairline);
  }
  .weather-loc-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .weather-loc {
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    letter-spacing: 0.4em;
    color: var(--ink);
    font-weight: 500;
  }
  .weather-loc-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .weather-cond {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.12em;
  }
  .weather-temp-row {
    display: flex;
    align-items: flex-end;
    gap: 14px;
    margin-top: 4px;
  }
  .weather-temp {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 68px;
    line-height: 0.95;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
    letter-spacing: -0.04em;
    position: relative;
    display: inline-block;
  }
  .weather-temp .deg {
    position: absolute;
    top: 4px;
    font-size: 26px;
    font-weight: 400;
    color: var(--ink-soft);
  }
  .weather-hilo {
    font-family: 'Source Serif 4', serif;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.08em;
    font-feature-settings: 'lnum', 'tnum';
    padding-bottom: 4px;
    line-height: 1.5;
  }
  .weather-hilo .sep { color: var(--ink-faint); margin: 0 4px; }
  .weather-big-icon {
    color: var(--ink);
    margin-left: auto;
    padding-bottom: 4px;
  }

  .weather-hourly {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-top: 10px;
    border-top: 1px dashed var(--hairline);
    padding-top: 8px;
  }
  .hour-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .hour-time {
    font-family: 'Source Serif 4', serif;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    font-feature-settings: 'lnum';
  }
  .hour-icon {
    width: 18px; height: 18px;
    color: var(--ink);
  }
  .hour-temp {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    font-feature-settings: 'lnum', 'tnum';
  }
  .hour-rain {
    font-family: 'Source Serif 4', serif;
    font-size: 9px;
    color: var(--stamp);
    font-feature-settings: 'lnum';
    font-style: italic;
  }

  /* === Calendar all-day strip — pinned to top of panel === */
  .cal-allday {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding: 5px 12px 5px 10px;
    margin-bottom: 10px;
    background: rgba(160, 56, 46, 0.05);
    border-left: 2px solid var(--stamp);
    overflow: hidden;
  }
  .cal-allday-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--stamp);
    flex-shrink: 0;
    font-weight: 500;
  }
  .cal-allday-list {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--ink);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    flex: 1;
  }
  .cal-allday-tmr {
    color: var(--ink-faint);
    font-style: italic;
    margin-right: 6px;
    font-size: 10px;
  }

  /* === Calendar === */
  .cal-now {
    background: var(--bg-deep);
    border: 1px solid var(--hairline);
    padding: 14px 20px;
    position: relative;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  /* Left column: title/meta — must be allowed to shrink so the countdown on
     the right keeps its full width (otherwise `小　時　後` wraps in portrait). */
  .cal-now > div:first-child { min-width: 0; flex: 1 1 auto; }
  .cal-now::before {
    content: '即將';
    position: absolute;
    top: -8px; left: 16px;
    background: var(--bg);
    padding: 0 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--stamp);
    font-weight: 500;
  }
  .cal-now.is-live::before { content: '現在'; }
  .cal-event-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal-event-meta {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.15em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 460px;
  }
  .cal-countdown {
    text-align: right;
    font-family: 'Source Serif 4', serif;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .cal-cd-num, .cal-cd-unit { white-space: nowrap; }
  .cal-cd-num {
    font-size: 48px;
    font-weight: 700;
    color: var(--stamp);
    line-height: 1;
    font-feature-settings: 'lnum', 'tnum';
  }
  .cal-cd-num.cal-cd-tmr {
    font-family: 'Noto Serif TC', serif;
    font-size: 36px;
    letter-spacing: 0.08em;
  }
  .cal-cd-unit {
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.4em;
    font-style: normal;
    margin-top: 2px;
  }

  .cal-list { display: flex; flex-direction: column; gap: 6px; }
  .cal-row {
    display: grid;
    grid-template-columns: 90px minmax(0, 1fr) minmax(0, 1.1fr);
    align-items: center;
    gap: 12px;
    padding: 4px 0;
    border-bottom: 1px dashed var(--hairline);
    font-size: 13px;
  }
  .cal-row:last-child { border-bottom: none; }
  .cal-row-time {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    color: var(--ink-soft);
    font-style: italic;
  }
  .cal-row-name {
    font-family: 'Noto Serif TC', serif;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .cal-row-loc {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  /* === 404 not found === */
  .nf-head {
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--ink-faint);
    font-style: italic;
    font-family: 'Source Serif 4', serif;
    text-transform: uppercase;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 4px;
    margin-bottom: 2px;
    display: flex;
    justify-content: space-between;
  }
  .nf-row {
    display: grid;
    grid-template-columns: 1fr 60px;
    align-items: baseline;
    padding: 4px 0;
    border-bottom: 1px dashed var(--hairline);
    font-size: 12px;
  }
  .nf-row:last-child { border-bottom: none; }
  .nf-path {
    font-family: 'Source Serif 4', serif;
    color: var(--stamp);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    /* RTL container makes overflow trim from the head; LTR child below
       keeps the actual characters in normal left-to-right reading order. */
    direction: rtl;
    text-align: left;
  }
  .nf-path > bdo { direction: ltr; }
  .nf-views {
    font-family: 'Source Serif 4', serif;
    font-feature-settings: 'lnum', 'tnum';
    text-align: right;
    color: var(--ink);
    font-weight: 600;
  }
  .nf-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 60px 0;
    color: var(--ink-soft);
  }
  .nf-empty-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    letter-spacing: 0.3em;
    color: var(--ink);
  }
  .nf-empty-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
  }
  /* source · medium · count — source takes the remaining width so long
     hostnames like tw.search.yahoo.com / chatgpt.com show fully. */
  .nf-row-ref { grid-template-columns: minmax(0, 1fr) 76px 60px; column-gap: 10px; }
  .nf-ref-host {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .nf-head-ref {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 76px 60px;
    column-gap: 10px;
  }
  .nf-empty-compact { padding: 16px 0; gap: 4px; }
  .nf-empty-compact .nf-empty-zh { font-size: 14px; letter-spacing: 0.2em; }
  .nf-section-title {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 6px;
    margin-bottom: 4px;
  }
  .nf-section-title-spaced { margin-top: 18px; }
  .nf-section-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--ink);
  }
  .nf-section-en {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
  }

  /* === Countdown === */
  .cd-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px 28px;
  }
  .cd-item {
    display: grid;
    grid-template-columns: 64px 1fr;
    align-items: center;
    gap: 14px;
    padding: 6px 0;
    border-bottom: 1px solid var(--hairline);
  }
  .cd-stamp {
    width: 60px; height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--stamp);
    color: var(--stamp);
    font-family: 'Noto Serif TC', serif;
    text-align: center;
    transform: rotate(-2deg);
    background: rgba(160, 56, 46, 0.04);
    position: relative;
  }
  .cd-stamp.past { border-color: var(--ink-soft); color: var(--ink-soft); background: rgba(0,0,0,0.03); }
  .cd-stamp::before {
    content: '';
    position: absolute;
    inset: -3px;
    border: 1px solid currentColor;
    opacity: 0.3;
  }
  .cd-num {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 22px;
    line-height: 1;
    font-feature-settings: 'lnum', 'tnum';
  }
  .cd-day-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    margin-top: 2px;
    font-style: italic;
    font-family: 'Source Serif 4', serif;
  }
  .cd-info { display: flex; flex-direction: column; gap: 2px; }
  .cd-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .cd-date {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.15em;
    font-feature-settings: 'lnum';
  }
  .cd-elapsed {
    font-family: 'Noto Serif TC', serif;
    font-size: 10px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
    margin-top: 1px;
  }

  /* === Footer: tab indicators + progress === */
  .footer {
    position: absolute;
    bottom: env(safe-area-inset-bottom);
    left: calc(28px + env(safe-area-inset-left));
    right: calc(28px + env(safe-area-inset-right));
    height: 32px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .tabs {
    display: flex;
    gap: 14px;
    flex: 1;
  }
  .tab-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .tab-check {
    font-size: 11px;
    color: var(--ink-faint);
    cursor: pointer;
    user-select: none;
    line-height: 1;
    padding: 2px;
  }
  .tab-check:hover { color: var(--stamp); }
  .tab-item.tab-disabled .tab-label {
    text-decoration: line-through;
    opacity: 0.45;
  }
  .tab-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    cursor: pointer;
    transition: color 0.3s;
    position: relative;
    padding: 4px 0;
  }
  .tab-label.active { color: var(--ink); font-weight: 500; }
  .tab-label.active::before {
    content: '';
    position: absolute;
    bottom: 0; left: -2px;
    width: 14px; height: 1px;
    background: var(--stamp);
  }
  .progress {
    width: 96px;
    height: 1px;
    background: var(--hairline);
    position: relative;
  }
  .progress-fill {
    position: absolute;
    top: -0.5px; left: 0;
    height: 2px;
    background: var(--ink);
    transition: width 0.1s linear;
  }
  .progress-num {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 10px;
    color: var(--ink-faint);
    font-feature-settings: 'lnum', 'tnum';
    letter-spacing: 0.1em;
    min-width: 28px;
  }

  /* Setup-error overlay — shown when no key in localStorage or fetch returns empty */
  .setup-error {
    position: absolute;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 32px;
    text-align: center;
    background: var(--bg);
    color: var(--ink);
  }
  .setup-error .se-stamp {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.5em;
    color: var(--stamp);
    border: 1.5px solid var(--stamp);
    padding: 6px 18px 6px 22px;
    transform: rotate(-2deg);
  }
  .setup-error .se-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: var(--ink);
  }
  .setup-error .se-desc {
    font-family: 'Source Serif 4', serif;
    font-style: italic;
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--ink-soft);
    max-width: 540px;
    line-height: 1.7;
  }
  .setup-error code {
    font-family: 'Source Serif 4', serif;
    background: var(--bg-deep);
    padding: 1px 6px;
    border: 1px solid var(--hairline);
    font-style: normal;
  }
  .setup-error a { color: var(--stamp); }
  .se-form {
    display: flex;
    gap: 8px;
    align-items: stretch;
    margin-top: 4px;
  }
  .se-form input {
    width: 280px;
    padding: 8px 12px;
    font-family: 'Source Serif 4', serif;
    font-size: 13px;
    color: var(--ink);
    background: var(--bg-deep);
    border: 1px solid var(--hairline);
    border-radius: 0;
    outline: none;
    letter-spacing: 0.05em;
  }
  .se-form input:focus { border-color: var(--stamp); }
  .se-form button {
    padding: 8px 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    letter-spacing: 0.4em;
    color: #f5efde;
    background: var(--stamp);
    border: 1px solid var(--stamp-deep);
    border-radius: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .se-form button:hover { background: var(--stamp-deep); }
  .se-form button:active { transform: translateY(1px); }

  /* Floating refresh button — semi-transparent, bottom-right of viewport */
  #refresh-btn {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 36px; height: 36px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(20,17,13,0.55);
    color: #f1ebdc;
    border-radius: 50%;
    padding: 0;
    cursor: pointer;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.3s, background 0.2s, transform 0.6s;
    opacity: 0.4;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    -webkit-tap-highlight-color: transparent;
  }
  #refresh-btn:hover, #refresh-btn:focus { opacity: 1; background: rgba(20,17,13,0.85); outline: none; }
  #refresh-btn svg { width: 16px; height: 16px; }
  #refresh-btn.spinning { pointer-events: none; opacity: 1; }
  #refresh-btn.spinning svg { animation: refresh-spin 0.9s linear infinite; }
  @keyframes refresh-spin { to { transform: rotate(360deg); } }

  /* Stale / error chip pinned to top-center of the device */
  .net-chip {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    padding: 4px 12px;
    background: rgba(160,56,46,0.92);
    color: #f5efde;
    font-family: 'Source Serif 4', serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    font-style: italic;
    border-radius: 12px;
    pointer-events: none;
    animation: chip-fade 0.4s ease;
  }
  @keyframes chip-fade { from { opacity: 0; transform: translate(-50%, -4px); } to { opacity: 1; transform: translateX(-50%); } }

  /* seconds variant — smaller subordinate flip cards */
  .flip-card.sec {
    width: 28px;
    height: 38px;
    perspective: 240px;
  }
  .flip-card.sec .flip-half,
  .flip-card.sec .flip-flap {
    height: 19px;
    font-size: 36px;
    line-height: 38px;
  }
  .flip-card.sec .flip-half > span,
  .flip-card.sec .flip-flap > span { line-height: 38px; }
  .flip-card.sec .flip-half.bottom > span { transform: translateY(-19px); }
  .flip-card.sec .flip-flap.flap-bottom > span { transform: translateY(-19px); }
  .clock-colon.sec {
    font-size: 24px;
    height: 38px;
    line-height: 38px;
    padding: 0 2px;
  }

  /* ============================================================== *
   * Narrow viewports (phones, small tablets in portrait).
   * The base design is landscape-first; here we shrink the header,
   * stack 2-col panels, hide non-essential stocks columns, and let
   * the footer wrap so 6 tabs fit.
   * ============================================================== */
  @media (max-width: 720px) {
    /* — Header — */
    .header {
      height: calc(86px + env(safe-area-inset-top));
      padding: calc(6px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 0 calc(14px + env(safe-area-inset-left));
      gap: 4px;
    }
    .header-strip { height: 18px; gap: 8px; }
    .header-brand { font-size: 10px; letter-spacing: 0.24em; }
    .hairline {
      top: calc(86px + env(safe-area-inset-top));
      left: calc(14px + env(safe-area-inset-left));
      right: calc(14px + env(safe-area-inset-right));
    }
    .date-num { font-size: 28px; }
    .date-weekday { font-size: 14px; }
    .date-line2 { gap: 10px; }
    .date-line3 { font-size: 9px; letter-spacing: 0.18em; }
    .net-dot { width: 7px; height: 7px; margin-right: 6px; }

    /* — Flip clock — */
    .flip-card { width: 30px; height: 42px; }
    .flip-half, .flip-flap { font-size: 36px; line-height: 42px; }
    .flip-half { height: 21px; }
    .flip-flap { height: 21px; }
    .flip-half.top > span,
    .flip-half.bottom > span,
    .flip-flap.flap-top > span,
    .flip-flap.flap-bottom > span { line-height: 42px; }
    .flip-half.bottom > span { transform: translateY(-21px); }
    .flip-flap.flap-bottom > span { transform: translateY(-21px); }
    .clock-colon { font-size: 22px; height: 42px; line-height: 42px; padding: 0 2px; }
    .clock { gap: 2px; padding-top: 2px; }
    .flip-group { gap: 2px; }
    /* seconds: scaled down so HH:MM:SS fits on iPhone-class widths */
    .flip-card.sec { width: 22px; height: 32px; }
    .flip-card.sec .flip-half,
    .flip-card.sec .flip-flap { font-size: 28px; line-height: 32px; height: 16px; }
    .flip-card.sec .flip-half > span,
    .flip-card.sec .flip-flap > span { line-height: 32px; }
    .flip-card.sec .flip-half.bottom > span,
    .flip-card.sec .flip-flap.flap-bottom > span { transform: translateY(-16px); }
    .clock-colon.sec { font-size: 18px; height: 32px; line-height: 32px; padding: 0 1px; }

    /* — Content — */
    .content {
      top: calc(94px + env(safe-area-inset-top));
      left: calc(14px + env(safe-area-inset-left));
      right: calc(14px + env(safe-area-inset-right));
      bottom: calc(60px + env(safe-area-inset-bottom));
    }
    .panel-head { margin-bottom: 10px; }
    .panel-title { font-size: 14px; letter-spacing: 0.32em; }
    .panel-title-en { font-size: 10px; letter-spacing: 0.18em; }

    /* — Footer (tabs wrap) — */
    .footer {
      left: calc(14px + env(safe-area-inset-left));
      right: calc(14px + env(safe-area-inset-right));
      bottom: calc(8px + env(safe-area-inset-bottom));
      height: auto;
      flex-wrap: wrap; row-gap: 6px; column-gap: 10px;
    }
    .tabs { gap: 5px 10px; flex-wrap: wrap; flex: 1 1 100%; order: 1; }
    .tab-label { font-size: 11px; letter-spacing: 0.22em; padding: 2px 0; }

  // === Key flow: accept ?key=... query OR #key=... hash. Persist to localStorage. ===
  // URL is left as-is so bookmarks / shared links keep working.
  (function () {
    var query = new URLSearchParams(location.search).get("key");
    var hash  = new URLSearchParams(location.hash.replace(/^#/, "")).get("key");

  // === Restore last-known data for instant first paint ===

  // === Register Service Worker, auto-reload on update ===
  if ("serviceWorker" in navigator) {

    // When a new SW takes control of this page (after skipWaiting + clients.claim),
    // browser fires `controllerchange`. Reload once so we get the new HTML/assets.
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (swReloadGuard) return;
      swReloadGuard = true;
      location.reload();
    });
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function (err) {

<script data-cfasync="false">
// Hide mobile Safari URL bar on load by nudging the scroll position.
window.addEventListener('load', function () {

// Hard refresh: ask GAS to flush its caches, drop SW + browser caches, reload.
document.addEventListener('DOMContentLoaded', function () {
  var btn = document.getElementById('refresh-btn');
  if (!btn) return;
  btn.addEventListener('click', async function () {
    btn.classList.add('spinning');
    try {
      var key = localStorage.getItem('DASHBOARD_KEY');
      if (key) {
        var url = 'https://script.google.com/macros/s/AKfycbxJoTtqTisPq8ZjJvSBzqAkQ8UIVc5XS9JdbHggmV4vGQ45paDCXYpNNgQwEr7VPaPxGw/exec'
                + '?key=' + encodeURIComponent(key) + '&refresh=1';
        try { await fetch(url, { redirect: 'follow' }); } catch (e) { console.warn('[refresh] gas flush failed', e); }
      }
      if (navigator.serviceWorker) {
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function (r) { return r.unregister(); }));
      }
      if (window.caches) {
        var names = await caches.keys();
        await Promise.all(names.map(function (n) { return caches.delete(n); }));
      }
      try { localStorage.removeItem('DASHBOARD_DATA'); } catch (e) {}
    } finally {
      location.reload();

<script data-cfasync="false" type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// Render a "[HH:MM:SS] 下次更新 mm:ss" label given an epoch-ms expiry
// timestamp. `lastFetchedAt` (Date|null) is prepended so the user can
// see when the JSON was last successfully pulled. Fed by the parent
// <App>'s `now` clock so it ticks every second.
function refreshCountdown(refreshAt, now, lastFetchedAt, fetching) {
  const prefix = lastFetchedAt
    ? `${pad2(lastFetchedAt.getHours())}:${pad2(lastFetchedAt.getMinutes())}:${pad2(lastFetchedAt.getSeconds())} · `
    : "";
  if (fetching) return prefix + "更新中…";
  if (!refreshAt) return prefix || null;
  const ms = refreshAt - now.getTime();
  if (ms <= 0) return prefix + "更新中…";
  const total = Math.ceil(ms / 1000);
  const m = Math.floor(total / 60), s = total % 60;
  return `${prefix}下次更新 ${pad2(m)}:${pad2(s)}`;
}
function pad2(n) { return String(n).padStart(2, '0'); }

// Decode any %XX escapes so paths read naturally; CSS handles the head-trim.
function decodePath(s) {
  if (!s) return s;
  try { return decodeURIComponent(s); } catch (e) { return s; }
}

// Strip the trailing site-name suffix that ZhgChgLi pages add to their <title>.
// e.g. "Apple Watch 米蘭錶帶開箱…  | ZhgChgLi Tech & Travel" → "Apple Watch 米蘭錶帶開箱…"
function stripSiteSuffix(title) {
  if (!title) return title;
  return String(title).replace(/\s*[|｜]\s*ZhgChgLi[^|｜]*$/, "").trim();
}

// =================================================================
// FLIP CLOCK
// =================================================================
function FlipDigit({ value, size = 'lg', duration = 640 }) {
  const [current, setCurrent] = useState(value);
  const [previous, setPrevious] = useState(value);
  const [flipping, setFlipping] = useState(false);

  useEffect(() => {
    if (value !== current) {
      setPrevious(current);
      setFlipping(true);
      const t = setTimeout(() => {
        setCurrent(value);
        setFlipping(false);
      }, duration);
      return () => clearTimeout(t);
    }
  }, [value, current, duration]);

  const next = value;
  const cls = `flip-card ${size === 'sm' ? 'sec' : ''}`;

  return (
    <div className={cls}>
      <div className="flip-half top"><span>{flipping ? next : current}</span></div>
      <div className="flip-half bottom"><span>{flipping ? previous : current}</span></div>
      {flipping && (
        <>
          <div className="flip-flap flap-top" key={`t-${previous}-${next}`}><span>{previous}</span></div>
          <div className="flip-flap flap-bottom" key={`b-${previous}-${next}`}><span>{next}</span></div>
        </>
      )}
    </div>
  );
}

function FlipClock({ now }) {
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const h1 = Math.floor(h / 10), h2 = h % 10;
  const m1 = Math.floor(m / 10), m2 = m % 10;
  const s1 = Math.floor(s / 10), s2 = s % 10;
  return (
    <div className="clock">
      <div className="flip-group">
        <FlipDigit value={h1} />
        <FlipDigit value={h2} />
      </div>
      <div className="clock-colon">:</div>
      <div className="flip-group">
        <FlipDigit value={m1} />
        <FlipDigit value={m2} />
      </div>
      <div className="clock-colon">:</div>
      <div className="flip-group">
        <FlipDigit value={s1} duration={360} />
        <FlipDigit value={s2} duration={360} />
      </div>
    </div>
  );
}

// =================================================================

const STOCKS_PANEL_META = {
  US: { zh: '美　股', enFallback: 'Portfolio · US Equities', currency: 'USD', payloadKey: 'stocksUS' },
  TW: { zh: '台　股', enFallback: 'Portfolio · TWSE',        currency: 'NTD', payloadKey: 'stocksTW' },
};
function StocksPanel({ data, now, lastFetchedAt, fetching, market }) {
  const meta = STOCKS_PANEL_META[market];
  const slice = data?.[meta.payloadKey] || {};
  const STOCK_DATA = slice.holdings || [];
  const totalValue = STOCK_DATA.reduce((s, x) => s + x.qty * x.price, 0);
  const totalCost = STOCK_DATA.reduce((s, x) => s + x.qty * (x.cost ?? 0), 0);
  // Unrealized P/L derived from cost basis vs current price — independent
  // of whatever `chg` the upstream feed provides.
  const totalPL = STOCK_DATA.reduce((s, x) => s + ((x.price - (x.cost ?? 0)) * x.qty), 0);
  const totalPLPct = totalCost > 0 ? (totalPL / totalCost) * 100 : 0;
  const isUp = totalPL >= 0;
  const refreshLabel = refreshCountdown(slice.refreshAt, now, lastFetchedAt, fetching) || meta.enFallback;

  return (
    <div className="tab-panel-inner">
      <div className="panel-head">
        <span className="panel-title">{meta.zh}</span>
        <span className="panel-title-en">{refreshLabel}</span>
      </div>
      <div className="stocks-summary">
        <div className="summary-block">
          <span className="summary-label">total value · {meta.currency}</span>
          <span className="summary-value">{Math.round(totalValue).toLocaleString()}</span>
        </div>
        <div className="summary-block">
          <span className="summary-label">total cost · {meta.currency}</span>
          <span className="summary-value">{Math.round(totalCost).toLocaleString()}</span>
        </div>
        <div className="summary-block">
          <span className="summary-label">unrealized · P&amp;L</span>
          <span className={`summary-value ${isUp ? 'up' : 'down'}`}>
            {isUp ? '+' : ''}{Math.round(totalPL).toLocaleString()}
            <span style={{fontSize:14, marginLeft:8, fontWeight:400}}>
              ({isUp ? '+' : ''}{totalPLPct.toFixed(2)}%)
            </span>
          </span>
        </div>
      </div>
      <div className="stocks-table">
        <div className="stocks-row head">
          <span>name</span>
          <span style={{textAlign:'right'}}>持股</span>
          <span style={{textAlign:'right'}}>成本</span>
          <span style={{textAlign:'right'}}>股價</span>
          <span style={{textAlign:'right'}}>總漲跌</span>
          <span style={{textAlign:'right'}}>未實現損益</span>
        </div>
        {STOCK_DATA.map(s => {
          const cost = s.cost ?? 0;
          const earn = (s.price - cost) * s.qty;
          const earnUp = earn > 0;
          // Total (unrealized) gain percentage vs cost basis. Uses
          // 0 when cost is missing/zero so we don't divide by zero.
          const totalPct = cost > 0 ? ((s.price - cost) / cost) * 100 : 0;
          return (
            <div className="stocks-row" key={s.code}>
              <span className="stk-name">{s.name}</span>

                {totalPct > 0 ? '+' : ''}{totalPct.toFixed(2)}%
              </span>
              <span className={`stk-num ${earn > 0 ? 'up' : earn < 0 ? 'down' : ''}`}>
                {earnUp ? '+' : ''}{Math.round(earn).toLocaleString()}
              </span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// =================================================================
// Tiny badge: shows ± delta relative to a baseline value. `format` lets
// callers control number formatting (e.g. money). Always shows a sign,
// renders `±0` in the flat case so the slot doesn't collapse.
function DeltaBadge({ value, prev, format }) {
  if (prev == null || value == null) return null;
  const diff = value - prev;
  const fmt = format || ((n) => Math.round(n).toLocaleString());
  const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
  const sign = diff > 0 ? '+' : diff < 0 ? '−' : '±';
  return <span className={`ga-delta ${cls}`}>{sign}{fmt(Math.abs(diff))}</span>;
}

function GAPanel({ data, now, lastFetchedAt, fetching }) {
  const GA_LIVE = data?.ga?.live || {};
  const GA_CUM  = data?.ga?.cum  || {};
  const GA_TOP_PATHS = GA_LIVE.topPaths || [];
  const GA_ACTIVE_USERS = GA_LIVE.activeUsers ?? 0;
  const GA_PAGE_VIEWS   = GA_LIVE.pageViews   ?? 0;

function CalendarPanel({ data, now }) {
  const CAL_EVENTS = data?.calendar?.events || [];

  // Pull all-day events out — they live in their own strip, never in 即將.
  const allDayEvents = CAL_EVENTS.filter(e => e.isAllDay);
  const timedEvents = CAL_EVENTS.filter(e => !e.isAllDay);

  const todayEvents = timedEvents.filter(e => e.day === 'today');
  const tomorrowEvents = timedEvents.filter(e => e.day === 'tomorrow');
  const undatedEvents = timedEvents.filter(e => !e.day);
  const todayLike = todayEvents.length ? todayEvents : undatedEvents;

  const next = todayLike[0] || tomorrowEvents[0];
  const isTomorrow = !todayLike.length && !!tomorrowEvents.length;
  const rest = isTomorrow ? tomorrowEvents.slice(1) : todayLike.slice(1);

  const nowMs = now.getTime();
  const nextLive = !!next && !isTomorrow
    && next.startAt != null
    && nowMs >= next.startAt
    && (next.endAt == null || nowMs < next.endAt);

  const headerCount = todayLike.length || tomorrowEvents.length;
  const headerLabel = isTomorrow
    ? `Tomorrow · ${headerCount} timed event${headerCount === 1 ? '' : 's'}`
    : `Today · ${headerCount} timed event${headerCount === 1 ? '' : 's'}`;

  return (
    <div className="tab-panel-inner">
      <div className="panel-head">
        <span className="panel-title">行　事　曆</span>
        <span className="panel-title-en">{headerLabel}</span>
      </div>
      {allDayEvents.length > 0 && (
        <div className="cal-allday" title={allDayEvents.map(e => e.name).join(' · ')}>
          <span className="cal-allday-label">全　日</span>
          <span className="cal-allday-list">
            {allDayEvents.map((e, i) => (
              <React.Fragment key={i}>
                {i > 0 && <span style={{color: 'var(--ink-faint)', margin: '0 6px'}}>·</span>}
                {e.day === 'tomorrow' && <span className="cal-allday-tmr">明日</span>}
                {e.name}
              </React.Fragment>
            ))}
          </span>
        </div>
      )}
      {next ? (
        <div className={`cal-now ${isTomorrow ? 'is-tomorrow' : ''} ${nextLive ? 'is-live' : ''}`}>
          <div>
            <div className="cal-event-title">{next.name}</div>
            <div className="cal-event-meta">{next.time} &nbsp;·&nbsp; {next.loc || '—'}</div>
          </div>
          <div className="cal-countdown">
            {isTomorrow ? (
              <>
                <div className="cal-cd-num cal-cd-tmr">明日</div>
                <div className="cal-cd-unit">tomorrow</div>
              </>
            ) : (() => {
              if (nextLive) {
                return (
                  <>
                    <div className="cal-cd-num cal-cd-tmr">進行中</div>
                    <div className="cal-cd-unit">in progress</div>
                  </>
                );
              }
              // Compute the countdown live from startAt + client `now`,
              // not from minutesUntil (server-cached up to 10 min stale).
              const m = next.startAt != null
                ? Math.max(0, Math.round((next.startAt - nowMs) / 60000))
                : Math.max(0, next.minutesUntil ?? 0);
              const useHours = m > 60;
              return (
                <>
                  <div className="cal-cd-num">{useHours ? Math.round(m / 60) : m}</div>
                  <div className="cal-cd-unit">{useHours ? '小　時　後' : '分　鐘　後'}</div>
                </>
              );
            })()}
          </div>
        </div>
      ) : allDayEvents.length === 0 ? (
        <div className="cal-now">
          <div>
            <div className="cal-event-title">最近沒有行程</div>
            <div className="cal-event-meta">enjoy a slow day · ☕</div>
          </div>
        </div>
      ) : null}
      <div className="cal-list">
        {rest.map((e, i) => (
          <div className="cal-row" key={i}>
            <span className="cal-row-time">{e.time}</span>
            <span className="cal-row-name">{e.name}</span>
            <span className="cal-row-loc">{e.loc}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function daysBetween(target, today) {
  const t = new Date(target);
  const d = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  return Math.round((t - d) / 86400000);
}

// Floor-to-month elapsed since `origDate` (e.g. birthday) → "X 年 Y 個月".
function yearsMonthsSince(origDate, today) {
  if (!origDate) return null;
  const o = new Date(origDate);
  if (isNaN(o)) return null;
  let years = today.getFullYear() - o.getFullYear();
  let months = today.getMonth() - o.getMonth();
  if (today.getDate() < o.getDate()) months -= 1;
  if (months < 0) { years -= 1; months += 12; }
  if (years < 0) return null;
  return { years, months };
}

function CountdownPanel({ now, data }) {
  const CD_EVENTS = (data?.countdown?.events || []).map(e => ({ ...e, date: e.target }));
  return (
    <div className="tab-panel-inner">
      <div className="panel-head">
        <span className="panel-title">倒　數　日</span>
        <span className="panel-title-en">D-Day · counting</span>
      </div>
      <div className="cd-grid">
        {CD_EVENTS.map((e, i) => {
          const diff = daysBetween(e.target, now);
          const isPast = diff < 0;
          const num = Math.abs(diff);
          const elapsed = e.repeat === 'yearly' ? yearsMonthsSince(e.origDate, now) : null;
          return (
            <div className="cd-item" key={i}>
              <div className={`cd-stamp ${isPast ? 'past' : ''}`}>
                <div className="cd-num">{num}</div>
                <div className="cd-day-label">{isPast ? 'PAST' : 'D-DAY'}</div>
              </div>
              <div className="cd-info">
                <div className="cd-name">{e.name}</div>
                <div className="cd-date">{e.date}{isPast ? ` · 已過 ${num} 天` : ` · 還有 ${num} 天`}</div>
                {elapsed && (
                  <div className="cd-elapsed">已經過了 {elapsed.years} 年 {elapsed.months} 個月</div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// Hosts treated as search engines / dev origins — referrals from these are
// noisy compared to genuine inbound links, so we sort them after everything else.
const SEARCH_HOST_RE = /^(?:https?:\/\/)?(?:www\.)?(?:google\.com|bing\.com|localhost|127\.0\.0\.1|[a-z0-9-]+\.search\.yahoo\.com|duckduckgo\.com|zhgchg\.li)(?:[/:?#]|$)/i;
function isSearchHost(url) { return SEARCH_HOST_RE.test(url || ""); }
function hostOf(url) {
  if (!url) return "—";
  try { return new URL(url).host.replace(/^www\./, ""); }
  catch (e) { return url.replace(/^https?:\/\//, "").split("/")[0] || url; }
}
function pathOf(url) {
  if (!url) return "";
  try {
    const u = new URL(url);
    const p = (u.pathname || "") + (u.search || "");
    return p === "/" ? "" : p;
  } catch (e) {
    const i = url.indexOf("/", url.indexOf("//") + 2);
    return i >= 0 ? url.slice(i) : "";
  }
}

function MessagePanel({ data, message, setMessage }) {
  const stored = (message ?? data?.message) || "";
  const [draft, setDraft] = useState("");
  const [busy, setBusy] = useState(false);
  const [status, setStatus] = useState(null); // { msg, err }
  const MAX = 200;
  // Newlines render as spaces in the marquee anyway and waste characters,
  // so collapse \r\n|\r|\n into a single space at submit and on input.
  const normalize = (s) => s.replace(/[\r\n]+/g, " ").slice(0, MAX);

  const callApi = async (params) => {
    setBusy(true);
    setStatus(null);
    try {
      const key = localStorage.getItem("DASHBOARD_KEY") || "";
      const url = GAS_URL + "?key=" + encodeURIComponent(key)
        + Object.entries(params).map(([k, v]) => `&${k}=${encodeURIComponent(v)}`).join("");
      const res = await fetch(url, { redirect: "follow" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      if (!json.ok) throw new Error("server rejected");
      setMessage(json.message || "");
      return json;
    } catch (e) {
      setStatus({ msg: String(e?.message || e), err: true });
      throw e;
    } finally {
      setBusy(false);
    }
  };

  const onSubmit = async () => {
    const v = normalize(draft.trim());
    if (!v) return;
    try {
      await callApi({ action: "setMessage", value: v });
      setDraft("");
      setStatus({ msg: "已送出", err: false });
    } catch (e) {}
  };

  const onClear = async () => {
    if (!stored) return;
    try {
      await callApi({ action: "clearMessage" });
      setStatus({ msg: "已清除", err: false });
    } catch (e) {}
  };

  return (
    <div className="tab-panel-inner msg-wrap">
      <div className="panel-head">
        <span className="panel-title">　留言板</span>
        <span className="panel-title-en">message board · shared</span>
      </div>

      <div className={`msg-current ${stored ? "" : "empty"}`}>
        {stored || "尚無留言"}
      </div>

      <div className="msg-form">
        <textarea
          className="msg-textarea"
          maxLength={MAX}
          placeholder="輸入想說的話，送出後同步到所有裝置…（最多 200 字、換行會自動轉空白）"
          value={draft}
          onChange={(e) => setDraft(normalize(e.target.value))}
          disabled={busy}
        />
        <div className="msg-actions">
          <button
            type="button"
            className="msg-btn primary"
            onClick={onSubmit}
            disabled={busy || !draft.trim()}
          >送　出</button>
          <button
            type="button"
            className="msg-btn danger"
            onClick={onClear}
            disabled={busy || !stored}
          >清除留言</button>
          {status && (
            <span className={`msg-status ${status.err ? "err" : ""}`}>
              {status.err ? "錯誤 · " : "✓ "}{status.msg}
            </span>
          )}
          <span className="msg-counter">{draft.length} / {MAX}</span>
        </div>
      </div>
    </div>
  );
}

          沒有金鑰？<a href="#" onClick={(e) => {
            e.preventDefault();
            localStorage.setItem("DASHBOARD_KEY", "demo");
            localStorage.removeItem("DASHBOARD_DATA");
            location.reload();
          }}>試用 Demo 模式</a>
        </div>
      ) : (
        <div className="se-desc">
          後端回了空資料，可能是金鑰錯誤或服務暫時不可用。<br/>
          <a href="#" onClick={(e) => { e.preventDefault(); reset(); }}>清除金鑰並重新輸入</a>
        </div>
      )}
    </div>
  );
}

function isEmptyPayload(d) {
  if (!d) return true;
  const keys = Object.keys(d);
  if (keys.length === 0) return true;
  // Server returns "{}" when unauthenticated; otherwise payload always has generatedAt.
  return !d.generatedAt;
}

const TABS_DISABLED_KEY = "DASHBOARD_TABS_DISABLED";
function loadDisabledTabs() {
  try { return new Set(JSON.parse(localStorage.getItem(TABS_DISABLED_KEY) || "[]")); }
  catch (e) { return new Set(); }
}

function App() {
  const [now, setNow] = useState(new Date());
  const [activeIdx, setActiveIdx] = useState(0);
  const [progress, setProgress] = useState(0);
  const [hasKey] = useState(() => !!localStorage.getItem("DASHBOARD_KEY"));
  const [authFailed, setAuthFailed] = useState(false);
  const [data, setData] = useState(window.DATA || {});
  const [lastFetchedAt, setLastFetchedAt] = useState(null);
  const [fetching, setFetching] = useState(false);
  const [message, setMessage] = useState(() => {
    try { return (JSON.parse(localStorage.getItem("DASHBOARD_DATA") || "{}").message) || ""; }
    catch (e) { return ""; }
  });
  const [netError, setNetError] = useState(null); // { msg } | null
  const [online, setOnline] = useState(() => navigator.onLine !== false);
  const [disabledTabs, setDisabledTabs] = useState(loadDisabledTabs);
  const [paused, setPaused] = useState(false);

  // Long-press on a non-interactive surface pauses the auto-cycle until
  // the pointer is released (250 ms threshold). Two quick taps in the
  // same area instead jumps to the next eligible tab.
  useEffect(() => {
    let timer = null;
    let lastTapAt = 0;
    let wasLongPress = false;
    const DOUBLE_MS = 350;
    const isInteractive = (el) => !!el?.closest?.(
      "button, input, textarea, a, .tab-label, .tab-check, .msg-btn, #refresh-btn, .net-dot"
    );
    const advanceToNext = () => {
      setActiveIdx(i => {
        for (let n = 1; n <= TABS.length; n++) {
          const next = (i + n) % TABS.length;
          const T = TABS[next];
          if (!T.noCycle && !disabledRef.current.has(T.id) && !T.isEmpty?.(dataRef.current)) return next;
        }
        return i;
      });
    };
    const down = (e) => {
      if (isInteractive(e.target)) return;
      const now = Date.now();
      if (timer) { clearTimeout(timer); timer = null; }
      if (now - lastTapAt < DOUBLE_MS && !wasLongPress) {
        // Second tap close to the first → advance to next tab and skip
        // the long-press timer entirely.
        lastTapAt = 0;
        advanceToNext();
        return;
      }
      lastTapAt = now;
      wasLongPress = false;
      timer = setTimeout(() => {
        wasLongPress = true;
        setPaused(true);
      }, 250);
    };
    const up = () => {
      if (timer) { clearTimeout(timer); timer = null; }
      setPaused(false);
    };
    document.addEventListener("pointerdown", down);
    document.addEventListener("pointerup", up);
    document.addEventListener("pointercancel", up);
    window.addEventListener("blur", up);
    return () => {
      if (timer) clearTimeout(timer);
      document.removeEventListener("pointerdown", down);
      document.removeEventListener("pointerup", up);
      document.removeEventListener("pointercancel", up);
      window.removeEventListener("blur", up);
    };
  }, []);

  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => {
      window.removeEventListener("online", on);
      window.removeEventListener("offline", off);
    };
  }, []);
  const netStatus = !online ? "offline" : (netError ? "stale" : "online");

  const toggleTabEnabled = (id) => {
    setDisabledTabs(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      try { localStorage.setItem(TABS_DISABLED_KEY, JSON.stringify([...next])); } catch (e) {}
      return next;
    });
  };
  const isTabSkippable = (T, d) =>
    disabledTabs.has(T.id) || !!T.isEmpty?.(d);

  // tick clock
  useEffect(() => {
    const id = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(id);
  }, []);

  // fetch data from GAS JSON endpoint; SW does stale-while-revalidate caching
  useEffect(() => {
    if (!hasKey) return;
    const key = localStorage.getItem("DASHBOARD_KEY");
    const url = GAS_URL + "?key=" + encodeURIComponent(key);

    const fetchData = async (bust) => {
      setFetching(true);
      try {
        // iOS PWA standalone freezes JS while backgrounded. On resume we
        // want a *fresh* network round-trip — append a unique `_t=` so the
        // SW cache key doesn't match a stale entry, and use cache:reload
        // so any HTTP cache layer is bypassed too.
        const u = bust ? `${url}&_t=${Date.now()}` : url;
        const res = await fetch(u, { redirect: "follow", cache: bust ? "reload" : "default" });
        if (!res.ok) {
          console.error("[fetch]", res.status);
          setNetError({ msg: `HTTP ${res.status}` });
          return;
        }
        const json = await res.json();
        if (isEmptyPayload(json)) {
          setAuthFailed(true);
          return;
        }
        setAuthFailed(false);
        setNetError(null);
        setData(json);
        setLastFetchedAt(new Date());
        setMessage(json.message || "");
        try { localStorage.setItem("DASHBOARD_DATA", JSON.stringify(json)); } catch (e) {}
      } catch (e) {
        console.error("[fetch]", e);
        setNetError({ msg: String(e?.message || e || "network error") });
      } finally {
        setFetching(false);
      }
    };
    let lastFetchAt = 0;
    let hiddenSince = null;
    const tryFetch = (opts) => {
      const force = !!opts?.force;
      const bust  = !!opts?.bust;
      const t = Date.now();
      if (!force && t - lastFetchAt < 3000) return;
      lastFetchAt = t;
      fetchData(bust);
    };
    tryFetch();
    const id = setInterval(() => tryFetch(), POLL_INTERVAL_MS);

    // iOS/Android suspend timers when the tab is hidden. Refetch on resume
    // so coming back to the dashboard always pulls fresh data — no page or
    // SW reload, just the JSON. iOS PWA in particular needs cache busting
    // (`bust: true`) to skip any stale SW response left from before the
    // freeze.
    const onVisibility = () => {
      if (document.visibilityState === "visible") {
        const wasHidden = hiddenSince != null;
        hiddenSince = null;
        tryFetch({ force: wasHidden, bust: wasHidden });
      } else {
        hiddenSince = Date.now();
      }
    };
    const onPageShow = (e) => {
      // BFCache restore — JS was frozen while we were away. Force fresh.
      if (e?.persisted) tryFetch({ force: true, bust: true });
    };
    const onFocus = () => tryFetch();
    const onResume = () => tryFetch({ force: true, bust: true });
    document.addEventListener("visibilitychange", onVisibility);
    window.addEventListener("pageshow", onPageShow);
    window.addEventListener("focus", onFocus);
    document.addEventListener("resume", onResume);    // Page Lifecycle API
    document.addEventListener("freeze", () => { hiddenSince = Date.now(); });

    // SW tells us when it served a stale (cached) response because the
    // network failed — show a chip so the user knows the data is from cache.
    const onSwMsg = (e) => {
      if (e.data?.type === "data-stale") {
        setNetError({ msg: "資料來自快取（網路問題）" });
      }
    };
    navigator.serviceWorker?.addEventListener("message", onSwMsg);

    return () => {
      clearInterval(id);
      document.removeEventListener("visibilitychange", onVisibility);
      window.removeEventListener("pageshow", onPageShow);
      window.removeEventListener("focus", onFocus);
      document.removeEventListener("resume", onResume);
      navigator.serviceWorker?.removeEventListener("message", onSwMsg);
    };
  }, []);

  // tab cycler — skips tabs disabled by checkbox or whose isEmpty(data) is true.
  // Read data + disabled set via refs so a fresh fetch / toggle doesn't reset the
  // 15s tab timer.
  const dataRef = useRef(data);
  useEffect(() => { dataRef.current = data; }, [data]);
  const disabledRef = useRef(disabledTabs);
  useEffect(() => { disabledRef.current = disabledTabs; }, [disabledTabs]);
  useEffect(() => {
    // Park on no-cycle tabs (留言板) until the user navigates away manually.
    if (TABS[activeIdx]?.noCycle) { setProgress(0); return; }
    // Long-press on the background freezes the rotator; resume on release.
    if (paused) { setProgress(0); return; }
    const start = Date.now();
    const id = setInterval(() => {
      const elapsed = Date.now() - start;
      const p = Math.min(elapsed / TAB_DURATION, 1);
      setProgress(p);
      if (p >= 1) {
        setActiveIdx(i => {
          for (let n = 1; n <= TABS.length; n++) {
            const next = (i + n) % TABS.length;
            const T = TABS[next];
            if (!T.noCycle && !disabledRef.current.has(T.id) && !T.isEmpty?.(dataRef.current)) return next;
          }
          return i;
        });
      }
    }, 80);
    return () => clearInterval(id);
  }, [activeIdx, paused]);

  // If the user disables the currently-active tab, jump to the next eligible one.
  useEffect(() => {
    if (!disabledTabs.has(TABS[activeIdx].id)) return;
    for (let n = 1; n <= TABS.length; n++) {
      const next = (activeIdx + n) % TABS.length;
      const T = TABS[next];
      if (!T.noCycle && !disabledTabs.has(T.id) && !T.isEmpty?.(data)) { setActiveIdx(next); return; }
    }
  }, [disabledTabs]);

  const handleTabClick = (i) => {
    setActiveIdx(i);
  };

  if (!hasKey) return <SetupError kind="no-key" />;
  if (authFailed) return <SetupError kind="empty" />;

  return (
    <>
      <Header now={now} netStatus={netStatus} message={message} />
      <div className="hairline"></div>
      {netError && (
        <div className="net-chip" title={netError.msg}>
          資料異常 · {netError.msg.length > 30 ? netError.msg.slice(0, 30) + "…" : netError.msg}
        </div>
      )}

      <div className="content">
        {TABS.map((T, i) => (
          <div className={`tab-panel ${i === activeIdx ? 'active' : ''}`} key={T.id}>
            <T.Comp now={now} data={data} lastFetchedAt={lastFetchedAt} fetching={fetching} message={message} setMessage={setMessage} {...(T.props || {})} />
          </div>
        ))}
      </div>

      <div className="footer">
        <div className="tabs">
          {TABS.map((T, i) => {
            const enabled = !disabledTabs.has(T.id);
            return (
              <span key={T.id} className={`tab-item ${enabled ? '' : 'tab-disabled'}`}>
                <span
                  className={`tab-label ${i === activeIdx ? 'active' : ''}`}
                  onClick={() => handleTabClick(i)}
                  onDoubleClick={(e) => {
                    if (T.noCycle) return;
                    e.stopPropagation();
                    toggleTabEnabled(T.id);
                  }}
                  title={T.noCycle ? undefined : (enabled ? "雙擊停用此分頁" : "雙擊啟用此分頁")}
                >
                  {T.label}
                </span>
              </span>
            );
          })}
        </div>
        <span className="progress-num">{String(activeIdx + 1).padStart(2, '0')}/{String(TABS.length).padStart(2, '0')}</span>
        <div className="progress">
          <div className="progress-fill" style={{ width: `${progress * 100}%` }}></div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
